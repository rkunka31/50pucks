name: Update NHL Playoff Stats

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch NHL Playoff Stats
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error
          from datetime import datetime, date, timedelta

          def fetch_json(url):
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0 (compatible; 50pucks/1.0)',
                  'Accept': 'application/json'
              })
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          stats = []

          # ── Source 1: NHL aggregate stats REST API ──────────────────────────
          try:
              d = fetch_json(
                  'https://api.nhle.com/stats/rest/en/skater/summary'
                  '?isAggregate=false&isGame=false&start=0&limit=500'
                  '&cayenneExp=gameTypeId%3D3%20and%20seasonId%3C%3D20252026%20and%20seasonId%3E%3D20252026'
              )
              players = [p for p in d.get('data', []) if p.get('gamesPlayed', 0) > 0]
              if players:
                  stats = [{'id': p['playerId'], 'name': p['skaterFullName'],
                            'team': p.get('teamAbbrevs', p.get('teamAbbrev', '')),
                            'pos': p.get('positionCode', ''),
                            'gp': p.get('gamesPlayed', 0), 'g': p.get('goals', 0),
                            'a': p.get('assists', 0), 'pts': p.get('points', 0)} for p in players]
                  print(f'Source 1 (NHL aggregate): {len(stats)} players')
          except Exception as e:
              print(f'Source 1 failed: {e}')

          # ── Source 2: boxscore aggregation ──────────────────────────────────
          if not stats:
              player_map = {}

              def add_players(players_list, abbrev):
                  for p in players_list:
                      pid = p.get('playerId')
                      if not pid:
                          continue
                      name = (p.get('name') or {}).get('default') or \
                             f"{(p.get('firstName') or {}).get('default', '')} {(p.get('lastName') or {}).get('default', '')}".strip()
                      if pid not in player_map:
                          player_map[pid] = {'id': pid, 'name': name, 'team': abbrev,
                                             'pos': p.get('position', p.get('positionCode', '')),
                                             'gp': 0, 'g': 0, 'a': 0, 'pts': 0}
                      s = player_map[pid]
                      s['gp'] += 1
                      s['g'] += p.get('goals', 0)
                      s['a'] += p.get('assists', 0)
                      s['pts'] = s['g'] + s['a']

              # Collect game IDs from score endpoint
              game_ids = set()
              cur = date(2026, 4, 18)
              while cur <= date.today():
                  try:
                      d = fetch_json(f'https://api-web.nhle.com/v1/score/{cur}')
                      for g in d.get('games', []):
                          if g.get('gameType') == 3:
                              game_ids.add(str(g['id']))
                  except Exception as e:
                      print(f'Score {cur}: {e}')
                  cur += timedelta(days=1)

              # Also try direct game IDs: format 2025030{round}{series}{game}
              days_in = (date.today() - date(2026, 4, 18)).days + 1
              for rnd in range(1, 5):
                  max_series = [0, 8, 4, 2, 1][rnd]
                  for series in range(1, max_series + 1):
                      for game in range(1, min(days_in + 1, 8)):
                          game_ids.add(f'2025030{rnd}{series}{game}')

              print(f'Trying {len(game_ids)} game IDs')

              for gid in sorted(game_ids):
                  try:
                      d = fetch_json(f'https://api-web.nhle.com/v1/gamecenter/{gid}/boxscore')
                      pgs = d.get('playerByGameStats', {})
                      ha = d.get('homeTeam', {}).get('abbrev', '')
                      aa = d.get('awayTeam', {}).get('abbrev', '')
                      add_players(pgs.get('homeTeam', {}).get('forwards', []) +
                                  pgs.get('homeTeam', {}).get('defense', []), ha)
                      add_players(pgs.get('awayTeam', {}).get('forwards', []) +
                                  pgs.get('awayTeam', {}).get('defense', []), aa)
                  except Exception:
                      pass

              stats = [s for s in player_map.values() if s['gp'] > 0]
              print(f'Source 2 (boxscores): {len(stats)} players')

          output = {
              'updated': datetime.utcnow().isoformat() + 'Z',
              'season': '20252026',
              'players': stats
          }
          with open('playoff_stats.json', 'w') as f:
              json.dump(output, f)
          print(f'Wrote {len(stats)} players to playoff_stats.json')
          if not stats:
              raise SystemExit(1)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add playoff_stats.json
          git diff --staged --quiet || git commit -m 'chore: update playoff stats [skip ci]'
          git push
