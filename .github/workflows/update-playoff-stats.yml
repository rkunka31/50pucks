name: Update NHL Playoff Stats

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch NHL Playoff Stats
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error
          from datetime import datetime, date, timedelta

          def fetch_json(url):
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0 (compatible; 50pucks/1.0)',
                  'Accept': 'application/json'
              })
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          PLAYOFF_TEAMS = ['CAR','BUF','COL','VGK','TBL','MTL','PIT','PHI',
                           'DAL','MIN','EDM','ANA','BOS','OTT','UTA','LAK']

          # ── Step 1: Seed all playoff roster players at 0 pts ─────────────────
          player_map = {}
          for team in PLAYOFF_TEAMS:
              try:
                  d = fetch_json(f'https://api-web.nhle.com/v1/roster/{team}/20252026')
                  for pos_key in ('forwards', 'defensemen'):
                      pos_code = 'D' if pos_key == 'defensemen' else 'F'
                      for p in d.get(pos_key, []):
                          pid = p.get('id')
                          if not pid:
                              continue
                          first = (p.get('firstName') or {}).get('default', '')
                          last  = (p.get('lastName')  or {}).get('default', '')
                          player_map[pid] = {
                              'id': pid,
                              'name': f'{first} {last}'.strip(),
                              'team': team,
                              'pos': pos_code,
                              'gp': 0, 'g': 0, 'a': 0, 'pts': 0
                          }
              except Exception as e:
                  print(f'Roster {team}: {e}')
          print(f'Roster seed: {len(player_map)} players across {len(PLAYOFF_TEAMS)} teams')

          # ── Step 2: Overlay stats from per-team club stats (most complete) ────
          club_hits = 0
          for team in PLAYOFF_TEAMS:
              for url in [
                  f'https://api-web.nhle.com/v1/club-stats/{team}/20252026/3',
                  f'https://api-web.nhle.com/v1/club-stats-season/{team}',
              ]:
                  try:
                      d = fetch_json(url)
                      skaters = d.get('skaters', d.get('playerStats', []))
                      updated = 0
                      for p in skaters:
                          pid = p.get('playerId') or p.get('id')
                          gp  = p.get('gamesPlayed', 0)
                          if not pid or gp == 0:
                              continue
                          entry = {
                              'gp':  gp,
                              'g':   p.get('goals', 0),
                              'a':   p.get('assists', 0),
                              'pts': p.get('points', p.get('goals', 0) + p.get('assists', 0))
                          }
                          if pid in player_map:
                              player_map[pid].update(entry)
                          else:
                              name = p.get('skaterFullName') or \
                                     f"{(p.get('firstName') or {}).get('default','')} " \
                                     f"{(p.get('lastName') or {}).get('default','')}".strip()
                              player_map[pid] = {'id': pid, 'name': name, 'team': team,
                                                 'pos': p.get('positionCode', ''), **entry}
                          updated += 1
                      if updated:
                          print(f'Club stats {team} ({url.split("/")[-1]}): {updated} players')
                          club_hits += 1
                          break  # don't try second URL if first worked
                  except Exception as e:
                      pass
          if club_hits:
              print(f'Club stats overlay: {club_hits} teams')

          # ── Step 3: Overlay stats from NHL aggregate REST API ─────────────────
          agg_success = False
          try:
              d = fetch_json(
                  'https://api.nhle.com/stats/rest/en/skater/summary'
                  '?isAggregate=false&isGame=false&start=0&limit=500'
                  '&cayenneExp=gameTypeId%3D3%20and%20seasonId%3C%3D20252026%20and%20seasonId%3E%3D20252026'
              )
              api_players = [p for p in d.get('data', []) if p.get('gamesPlayed', 0) > 0]
              if api_players:
                  for p in api_players:
                      pid = p.get('playerId')
                      if pid and pid in player_map:
                          player_map[pid].update({
                              'gp': p.get('gamesPlayed', 0),
                              'g':  p.get('goals', 0),
                              'a':  p.get('assists', 0),
                              'pts': p.get('points', 0)
                          })
                      elif pid:
                          player_map[pid] = {
                              'id': pid,
                              'name': p.get('skaterFullName', ''),
                              'team': p.get('teamAbbrevs', p.get('teamAbbrev', '')),
                              'pos': p.get('positionCode', ''),
                              'gp': p.get('gamesPlayed', 0),
                              'g':  p.get('goals', 0),
                              'a':  p.get('assists', 0),
                              'pts': p.get('points', 0)
                          }
                  agg_success = True
                  print(f'Aggregate API: updated {len(api_players)} players with live stats')
          except Exception as e:
              print(f'Aggregate API failed: {e}')

          # ── Step 3: If aggregate API failed, overlay from boxscores ──────────
          if not agg_success:
              def add_from_boxscore(players_list, abbrev):
                  for p in players_list:
                      pid = p.get('playerId') or p.get('id')
                      if not pid:
                          continue
                      name = (p.get('name') or {}).get('default') or \
                             f"{(p.get('firstName') or {}).get('default', '')} " \
                             f"{(p.get('lastName') or {}).get('default', '')}".strip()
                      if pid not in player_map:
                          player_map[pid] = {'id': pid, 'name': name, 'team': abbrev,
                                             'pos': p.get('position', p.get('positionCode', '')),
                                             'gp': 0, 'g': 0, 'a': 0, 'pts': 0}
                      s = player_map[pid]
                      s['gp'] += 1
                      s['g'] += p.get('goals', 0)
                      s['a'] += p.get('assists', 0)
                      s['pts'] = s['g'] + s['a']

              game_ids = set()
              cur = date(2026, 4, 18)
              while cur <= date.today():
                  try:
                      d = fetch_json(f'https://api-web.nhle.com/v1/score/{cur}')
                      for g in d.get('games', []):
                          gt = g.get('gameType')
                          if gt in (3, '3', 'P'):
                              game_ids.add(str(g['id']))
                  except Exception as e:
                      print(f'Score {cur}: {e}')
                  cur += timedelta(days=1)

              days_in = (date.today() - date(2026, 4, 18)).days + 1
              for rnd in range(1, 5):
                  max_series = [0, 8, 4, 2, 1][rnd]
                  for series in range(1, max_series + 1):
                      for game in range(1, min(days_in + 1, 8)):
                          game_ids.add(f'2025030{rnd}{series}{game}')

              print(f'Trying {len(game_ids)} game IDs')
              hit_games = 0
              for gid in sorted(game_ids):
                  try:
                      d = fetch_json(f'https://api-web.nhle.com/v1/gamecenter/{gid}/boxscore')
                      pgs = d.get('playerByGameStats', {})
                      ha = d.get('homeTeam', {}).get('abbrev', '')
                      aa = d.get('awayTeam', {}).get('abbrev', '')
                      for side, abbrev in [('homeTeam', ha), ('awayTeam', aa)]:
                          team_pgs = pgs.get(side, {})
                          skaters = (team_pgs.get('forwards') or []) + \
                                    (team_pgs.get('defense') or []) + \
                                    (team_pgs.get('skaters') or [])
                          add_from_boxscore(skaters, abbrev)
                      if ha or aa:
                          hit_games += 1
                          print(f'  Game {gid}: {ha} vs {aa}')
                  except Exception:
                      pass
              print(f'Boxscore games found: {hit_games}')

          stats = list(player_map.values())
          played = sum(1 for s in stats if s['gp'] > 0)
          print(f'Final: {len(stats)} players total, {played} have played')

          # ── Step 4: Track series wins from boxscores (always runs) ────────────
          # R1 matchups: used to seed pair_wins and to label series in output
          R1_MATCHUPS = [
              ('COL','LAK'),('DAL','MIN'),('VGK','UTA'),('EDM','ANA'),
              ('BUF','BOS'),('TBL','MTL'),('CAR','OTT'),('PIT','PHI'),
          ]
          pair_wins = {}  # {(t1,t2): {t1: wins, t2: wins}}  t1<t2 alphabetically

          days_in = (date.today() - date(2026, 4, 18)).days + 1
          series_game_ids = set()
          for rnd in range(1, 5):
              max_series_r = [0, 8, 4, 2, 1][rnd]
              for s in range(1, max_series_r + 1):
                  for g in range(1, min(days_in + 2, 8)):
                      series_game_ids.add(f'2025030{rnd}{s}{g}')

          series_hit = 0
          for gid in sorted(series_game_ids):
              try:
                  d = fetch_json(f'https://api-web.nhle.com/v1/gamecenter/{gid}/boxscore')
                  ha = d.get('homeTeam', {}).get('abbrev', '')
                  aa = d.get('awayTeam', {}).get('abbrev', '')
                  h_score = d.get('homeTeam', {}).get('score', -1)
                  a_score = d.get('awayTeam', {}).get('score', -1)
                  state = d.get('gameState', '')
                  if not ha or not aa or h_score < 0 or a_score < 0:
                      continue
                  if state not in ('OFF', 'FINAL', 'OFFICIAL', 'OVER'):
                      continue
                  key = tuple(sorted([ha, aa]))
                  if key not in pair_wins:
                      pair_wins[key] = {key[0]: 0, key[1]: 0}
                  winner = ha if h_score > a_score else aa
                  pair_wins[key][winner] = pair_wins[key].get(winner, 0) + 1
                  series_hit += 1
              except Exception:
                  pass
          print(f'Series tracking: {series_hit} finished games across {len(pair_wins)} matchups')

          # Build seriesScores dict: key = "T1:T2" (R1 order), value = [t1wins, t2wins]
          series_scores = {}
          for t1, t2 in R1_MATCHUPS:
              key = tuple(sorted([t1, t2]))
              w = pair_wins.get(key, {})
              series_scores[f'{t1}:{t2}'] = [w.get(t1, 0), w.get(t2, 0)]
          # Also capture R2+ series (any pair not in R1 that has games)
          r1_pairs = {tuple(sorted(m)) for m in R1_MATCHUPS}
          for key, w in pair_wins.items():
              if key not in r1_pairs:
                  t1, t2 = key
                  series_scores[f'{t1}:{t2}'] = [w.get(t1, 0), w.get(t2, 0)]
          print(f'Series scores: {series_scores}')

          # ── Derive eliminated teams from series wins ───────────────────────────
          MANUAL_ELIMINATED = ['OTT', 'LAK']  # safety override; remove once auto-detection is confirmed working
          alive_teams = list(PLAYOFF_TEAMS)
          for key, w in pair_wins.items():
              t1, t2 = key
              if w.get(t1, 0) == 4 and t2 in alive_teams:
                  alive_teams.remove(t2)
                  print(f'Series: eliminated {t2} (lost to {t1} 4-{w.get(t2,0)})')
              elif w.get(t2, 0) == 4 and t1 in alive_teams:
                  alive_teams.remove(t1)
                  print(f'Series: eliminated {t1} (lost to {t2} 4-{w.get(t1,0)})')
          for team in MANUAL_ELIMINATED:
              if team in alive_teams:
                  alive_teams.remove(team)
                  print(f'Manual override: {team}')
          print(f'Alive ({len(alive_teams)}): {alive_teams}')

          output = {
              'updated': datetime.utcnow().isoformat() + 'Z',
              'season': '20252026',
              'aliveTeams': alive_teams,
              'seriesScores': series_scores,
              'players': stats
          }
          with open('playoff_stats.json', 'w') as f:
              json.dump(output, f)
          print(f'Wrote {len(stats)} players to playoff_stats.json')
          if not stats:
              raise SystemExit(1)

          # ── Daily history snapshot ──────────────────────────────────────────
          import os
          history_file = 'playoff_history.json'
          today_str = date.today().isoformat()
          history = []
          if os.path.exists(history_file):
              try:
                  with open(history_file) as f:
                      history = json.load(f)
              except Exception:
                  history = []

          # Bootstrap: seed April 18 as day-0 (all zeros) if starting fresh
          if not history:
              history.append({
                  'date': '2026-04-18',
                  'players': [{'id': p['id'], 'name': p['name'], 'pts': 0, 'gp': 0}
                               for p in stats]
              })

          # Upsert today's snapshot (compact: id, name, pts, gp only)
          today_snap = {
              'date': today_str,
              'players': [{'id': p['id'], 'name': p['name'],
                           'pts': p.get('pts', 0), 'gp': p.get('gp', 0)}
                          for p in stats]
          }
          idx = next((i for i, h in enumerate(history) if h['date'] == today_str), -1)
          if idx >= 0:
              history[idx] = today_snap
          else:
              history.append(today_snap)
          history.sort(key=lambda h: h['date'])
          with open(history_file, 'w') as f:
              json.dump(history, f)
          print(f'History: {len(history)} days → {history_file}')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add playoff_stats.json playoff_history.json
          git diff --staged --quiet || git commit -m 'chore: update playoff stats [skip ci]'
          git push
