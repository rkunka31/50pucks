// NHL API — supports both current and historical seasons
// ============================================================
async function fetchStats(){
  // Try season-specific leaders endpoint (works for historical + current)
  try{
    const url=`https://api-web.nhle.com/v1/skater-stats-leaders/${CONFIG.nhlSeasonId}/3?categories=points,goals,assists&limit=-1`;
    const r=await fetch(url);
    if(r.ok){const d=await r.json();const res=parseLeaders(d);if(res.length>0)return res;}
  }catch(e){console.warn('Leaders API:',e);}
  // Try current endpoint
  try{
    const r=await fetch('https://api-web.nhle.com/v1/skater-stats-leaders/current?categories=points,goals,assists&gameType=3&limit=-1');
    if(r.ok){const d=await r.json();const res=parseLeaders(d);if(res.length>0)return res;}
  }catch(e){console.warn('Current API:',e);}
  // Fallback: stats rest API
  try{
    const url=`https://api.nhle.com/stats/rest/en/skater/summary?isAggregate=false&isGame=false&sort=[{"property":"points","direction":"DESC"}]&start=0&limit=200&cayenneExp=gameTypeId=3 and seasonId<=${CONFIG.nhlSeasonId} and seasonId>=${CONFIG.nhlSeasonId}`;
    const r=await fetch(url);if(!r.ok)return[];
    const d=await r.json();
    return(d.data||[]).map(p=>({id:p.playerId,name:p.skaterFullName,team:norm(p.teamAbbrevs),pos:p.positionCode,gp:p.gamesPlayed||0,g:p.goals||0,a:p.assists||0,pts:p.points||0}));
  }catch{return[];}
}

function parseLeaders(d){
  const m=new Map();
  const proc=(list,cat)=>{if(!list)return;for(const p of list){const id=p.id;if(!m.has(id))m.set(id,{id,name:`${p.firstName?.default||''} ${p.lastName?.default||''}`.trim(),team:norm(p.teamAbbrev?.default||p.teamAbbrev||''),pos:p.positionCode||'',gp:0,g:0,a:0,pts:0});const o=m.get(id);if(cat==='points'){o.pts=p.value||0;}if(cat==='goals'){o.g=p.value||0;}if(cat==='assists'){o.a=p.value||0;}}};
  proc(d.points,'points');proc(d.goals,'goals');proc(d.assists,'assists');
  return[...m.values()];
}

async function fetchGames(){
  try{const t=new Date().toISOString().split('T')[0];const r=await fetch(`https://api-web.nhle.com/v1/schedule/${t}`);if(!r.ok)return[];const d=await r.json();return(d.gameWeek?.[0]?.games||[]).filter(g=>g.gameType===3);}catch{return[];}
}

function buildLookup(stats){
  const m=new Map();
  for(const p of stats){const k=p.name.toLowerCase().trim();m.set(k,p);const n=k.normalize('NFD').replace(/[\u0300-\u036f]/g,'');if(n!==k)m.set(n,p);}
  return m;
}

function match(name,lookup){
  if(!name)return null;
  const c=name.toLowerCase().trim();
  if(lookup.has(c))return lookup.get(c);
  const n=c.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(lookup.has(n))return lookup.get(n);
  const di=c.indexOf(' - ');
  if(di>0){const no=c.substring(0,di).trim();if(lookup.has(no))return lookup.get(no);}
  for(const[k,v]of lookup){if(k.includes(c)||c.includes(k))return v;}
  return null;
}

function parseCsv(csv){
  const lines=csv.split('\n').filter(l=>l.trim());if(lines.length<2)return[];
  const entries=new Map();
  for(let i=1;i<lines.length;i++){const cols=csvLine(lines[i]);if(cols.length<6)continue;const[tn,on,pn,pt,pos,pk]=cols.map(c=>c.trim());if(!tn||!pn)continue;if(!entries.has(tn))entries.set(tn,{teamName:tn,owner:on||tn,players:[]});entries.get(tn).players.push({name:pn,team:norm(pt),position:['D','DEF','DEFENSE'].includes((pos||'').toUpperCase())?'D':'F',pucks:parseInt(pk)||0});}
  return[...entries.values()];
}
function csvLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}

// ============================================================
// SCORING
// ============================================================
function calcScores(entries,lookup){
  const scored=entries.map(e=>{
    let total=0,al=0,bestN=null,worstN=null,bestS=-Infinity,worstS=Infinity;
    const players=e.players.map(p=>{
      const s=match(p.name,lookup);
      const pts=s?.pts||0,g=s?.g||0,a=s?.a||0,gp=s?.gp||0;
      const m=mult(p.team),isAl=alive(p.team),score=pts*m*p.pucks;
      if(isAl)al++;total+=score;
      if(score>bestS){bestS=score;bestN=p.name;}
      if(score<worstS){worstS=score;worstN=p.name;}
      return{...p,pts,g,a,gp,mult:m,score:Math.round(score*100)/100,alive:isAl,matched:!!s};
    });
    const fw=players.filter(p=>p.position==='F').sort((a,b)=>b.score-a.score);
    const df=players.filter(p=>p.position==='D').sort((a,b)=>b.score-a.score);
    return{...e,players:[...fw,...df],totalScore:Math.round(total*100)/100,alive:al,totalPlayers:players.length,bestPick:bestN,bestS:Math.round(bestS*100)/100,worstPick:worstN,worstS:Math.round(worstS*100)/100,pucksUsed:players.reduce((s,p)=>s+p.pucks,0)};
  });
  scored.sort((a,b)=>b.totalScore-a.totalScore);
  let rank=1;for(let i=0;i<scored.length;i++){if(i>0&&scored[i].totalScore<scored[i-1].totalScore)rank=i+1;scored[i].rank=rank;}
  return scored;
}

function poolStats(entries){
  const pop=new Map();
  for(const e of entries)for(const p of e.players){if(!pop.has(p.name))pop.set(p.name,{count:0,tp:0,scores:[],pos:p.position});const o=pop.get(p.name);o.count++;o.tp+=p.pucks;o.scores.push(p.score);}
  const players=[...pop.entries()].map(([n,d])=>({name:n,pos:d.pos,count:d.count,tp:d.tp,avgPk:Math.round(d.tp/d.count*10)/10,avgSc:Math.round(d.scores.reduce((a,b)=>a+b,0)/d.count*10)/10,maxSc:Math.max(...d.scores),own:Math.round(d.count/entries.length*100)})).sort((a,b)=>b.count-a.count||b.avgSc-a.avgSc);
  let gB=null,gW=null;
  for(const e of entries)for(const p of e.players){if(!gB||p.score>gB.score)gB={...p,tn:e.teamName};if(!gW||p.score<gW.score)gW={...p,tn:e.teamName};}
  return{total:entries.length,pool:entries.length*CONFIG.entryFee,players,gB,gW,avg:entries.length?Math.round(entries.reduce((s,e)=>s+e.totalScore,0)/entries.length):0};
}

// ============================================================
// SIMULATION
// ============================================================
function runSim(entries,cfg){
  const ns=cfg.n||1000,res=new Map();entries.forEach(e=>res.set(e.teamName,[]));
  for(let s=0;s<ns;s++)for(const e of entries){let t=0;for(const p of e.players)t+=simP(p,cfg)*p.mult*p.pucks;res.get(e.teamName).push(Math.round(t*100)/100);}
  const projs=entries.map(e=>{const sm=res.get(e.teamName).sort((a,b)=>a-b);const mn=sm.reduce((a,b)=>a+b,0)/sm.length;return{tn:e.teamName,cur:e.totalScore,mean:Math.round(mn),med:Math.round(sm[Math.floor(sm.length*.5)]),p10:Math.round(sm[Math.floor(sm.length*.1)]),p90:Math.round(sm[Math.floor(sm.length*.9)]),sm};});
  const wins=new Map();entries.forEach(e=>wins.set(e.teamName,0));
  for(let s=0;s<ns;s++){let b='',bs=-Infinity;for(const[tn,sm]of res)if(sm[s]>bs){bs=sm[s];b=tn;}wins.set(b,(wins.get(b)||0)+1);}
  projs.forEach(p=>p.wp=Math.round(wins.get(p.tn)/ns*1000)/10);projs.sort((a,b)=>b.mean-a.mean);return projs;
}
function simP(p,cfg){const cur=p.pts||0,gp=p.gp||0;if(!p.alive)return cur;const ppg=gp>0?cur/gp:0.5;const adv=cfg.adv?.[p.mult]??0.5;let rem=Math.max(0,Math.min(3,7-(gp%7)));for(let r=0;r<3;r++){if(Math.random()<adv)rem+=4+Math.floor(Math.random()*4);else break;}let f=0;for(let g=0;g<rem;g++){const rate=Math.max(0,ppg+gauss()*ppg*(cfg.v||0.5));f+=pois(rate);}return cur+f;}
function gauss(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function pois(l){if(l<=0)return 0;const L=Math.exp(-l);let k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}

let _loading=false;
async function loadData(){
  if(_loading)return;_loading=true;set({loading:true});
  try{
    const[stats,entries,games]=await Promise.all([fetchStats().catch(()=>[]),fetchEntries().catch(()=>getSampleEntries()),fetchGames().catch(()=>[])]);
    const lookup=buildLookup(stats);const scored=calcScores(entries,lookup);const ps=poolStats(scored);
    set({loading:false,entries:scored,stats:ps,games,updated:new Date(),selTeam:scored[0]?.teamName||null});
  }catch(e){console.error(e);set({loading:false});}
  _loading=false;
}

// RENDER HELPERS
// ============================================================
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function rankBadge(r){if(r<=3)return`<div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${r===1?'rank-1':r===2?'rank-2':'rank-3'}">${r}</div>`;return`<span class="text-gray-400 text-sm font-mono">${r}</span>`;}
function puckDots(n){return Array(n).fill('<span class="puck-dot"></span>').join('');}
function teamBadge(t){const tm=TEAMS[t];return`<span class="inline-block px-1.5 py-0.5 rounded text-[10px] font-bold" style="background:${(tm?.c||'#666')}15;color:${tm?.c||'#666'}">${t}</span>`;}
function aliveColor(a,t){return a>t*0.7?'text-emerald-600':a>t*0.4?'text-amber-600':'text-red-500';}

// ============================================================
// MAIN RENDER
// ============================================================
function render(){
  const app=document.getElementById('app');
  if(S.loading){app.innerHTML=`<div class="flex items-center justify-center min-h-screen"><div class="text-center"><div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-gray-800 to-gray-700 flex items-center justify-center text-emerald-400 font-extrabold text-xl mx-auto mb-4">50</div><p class="text-gray-400 text-sm">Loading playoff stats...</p></div></div>`;return;}
  app.innerHTML=renderHeader()+renderNav()+`<main class="max-w-6xl mx-auto px-4 py-6">${renderTab()}</main>`+`<footer class="border-t border-gray-200 py-6 mt-8"><div class="max-w-6xl mx-auto px-4 text-center text-gray-400 text-xs">${CONFIG.title} · ${CONFIG.year} NHL Playoffs</div></footer>`;
  bindAll();renderCharts();
}

function renderHeader(){
  const time=S.updated?S.updated.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
  const live=S.games.length;
  return`<header class="header-bg text-white"><div class="max-w-6xl mx-auto px-4 py-5"><div class="flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-9 h-9 rounded-lg bg-emerald-500 flex items-center justify-center text-white font-extrabold text-sm">50</div><div><div class="text-lg font-bold tracking-tight">${CONFIG.title}</div><div class="text-gray-400 text-xs">${CONFIG.year} NHL Playoffs · ${S.entries.length} entries</div></div></div><div class="flex items-center gap-3">${live?`<div class="flex items-center gap-1.5 px-2.5 py-1 bg-emerald-500/15 border border-emerald-500/30 rounded-full"><div class="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse"></div><span class="text-emerald-400 text-[11px] font-medium">${live} live</span></div>`:''}<button onclick="loadData()" class="flex items-center gap-1.5 px-3 py-1.5 bg-white/10 hover:bg-white/15 rounded-lg text-white/80 text-xs font-medium transition">↻ <span class="hidden sm:inline">Refresh</span></button>${time?`<span class="text-gray-500 text-xs hidden sm:inline">${time}</span>`:''}</div></div></div></header>`;}

function renderNav(){
  const tabs=[{id:'leaderboard',l:'Leaderboard'},{id:'team',l:'Team Detail'},{id:'chart',l:'Charts'},{id:'players',l:'Players'},{id:'simulation',l:'Projections'},{id:'info',l:'Pool Info'}];
  return`<nav class="bg-white border-b border-gray-200 sticky top-0 z-40"><div class="max-w-6xl mx-auto px-4"><div class="flex gap-6 overflow-x-auto">${tabs.map(t=>`<button onclick="set({tab:'${t.id}'})" class="py-3 text-sm font-medium whitespace-nowrap transition ${S.tab===t.id?'tab-active':'tab-inactive'}">${t.l}</button>`).join('')}</div></div></nav>`;}

function renderTab(){
  switch(S.tab){
    case'leaderboard':return renderLeaderboard();case'team':return renderTeamDetail();case'chart':return renderChartTab();
    case'players':return renderPlayersTab();case'simulation':return renderSimTab();case'info':return renderInfoTab();default:return'';
  }
}

// ============================================================
// LEADERBOARD
// ============================================================
function renderLeaderboard(){
  const e=S.entries,s=S.stats,pool=e.length*CONFIG.entryFee;
  const pay=CONFIG.payoutSplit.map(p=>({...p,amt:Math.round(pool*p.pct)}));
  const cards=`<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
    <div class="stat-card bg-emerald-50 border-emerald-200"><div class="text-xs text-emerald-700 font-medium mb-1">Prize Pool</div><div class="text-2xl font-bold text-emerald-900 font-mono">$${pool}</div><div class="text-[11px] text-emerald-600">${e.length} × $${CONFIG.entryFee} ${CONFIG.currency}</div></div>
    <div class="stat-card bg-blue-50 border-blue-200"><div class="text-xs text-blue-700 font-medium mb-1">Best Pick</div><div class="text-2xl font-bold text-blue-900 font-mono">${s?.gB?.score?.toLocaleString()||'—'}</div><div class="text-[11px] text-blue-600 truncate">${esc(s?.gB?.name||'')}</div></div>
    <div class="stat-card bg-amber-50 border-amber-200"><div class="text-xs text-amber-700 font-medium mb-1">Avg Score</div><div class="text-2xl font-bold text-amber-900 font-mono">${s?.avg?.toLocaleString()||'—'}</div><div class="text-[11px] text-amber-600">per entry</div></div>
    <div class="stat-card bg-gray-50 border-gray-200"><div class="text-xs text-gray-500 font-medium mb-1">Payouts</div><div class="flex gap-2 mt-1">${pay.map(p=>`<div class="text-center"><div class="text-xs font-bold text-gray-900">$${p.amt}</div><div class="text-[10px] text-gray-400">${p.label}</div></div>`).join('')}</div></div>
  </div>`;

  const rows=e.map(en=>`<tr onclick="set({selTeam:'${esc(en.teamName)}',tab:'team'})" class="border-b border-gray-100 trow cursor-pointer">
    <td class="px-4 py-3 w-12">${rankBadge(en.rank)}</td>
    <td class="px-4 py-3"><div class="font-semibold text-gray-900 text-sm">${esc(en.teamName)}</div><div class="text-gray-400 text-xs">${esc(en.owner)}</div></td>
    <td class="px-4 py-3 text-right"><div class="font-mono font-bold text-gray-900">${en.totalScore.toLocaleString()}</div></td>
    <td class="px-4 py-3 text-center hidden sm:table-cell"><span class="text-sm font-semibold ${aliveColor(en.alive,en.totalPlayers)}">${en.alive}/${en.totalPlayers}</span></td>
    <td class="px-4 py-3 text-right hidden md:table-cell"><div class="text-xs text-emerald-600 font-medium">${esc(en.bestPick)}</div><div class="text-[11px] text-gray-400 font-mono">${en.bestS?.toLocaleString()}</div></td>
    <td class="px-4 py-3 text-right hidden lg:table-cell"><div class="text-xs text-red-500 font-medium">${esc(en.worstPick)}</div><div class="text-[11px] text-gray-400 font-mono">${en.worstS?.toLocaleString()}</div></td>
    <td class="px-2 py-3 text-gray-300">›</td>
  </tr>`).join('');

  return`${cards}<div class="card overflow-hidden"><table class="w-full"><thead><tr class="border-b border-gray-200 bg-gray-50"><th class="text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2.5 w-12">#</th><th class="text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2.5">Team</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2.5">Score</th><th class="text-center text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2.5 hidden sm:table-cell">Alive</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2.5 hidden md:table-cell">Best Pick</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2.5 hidden lg:table-cell">Worst Pick</th><th class="w-6"></th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ============================================================
// TEAM DETAIL
// ============================================================
function renderTeamDetail(){
  const e=S.entries.find(e=>e.teamName===S.selTeam)||S.entries[0];if(!e)return'<p class="text-gray-400">No entries.</p>';
  const opts=S.entries.map(en=>`<option value="${esc(en.teamName)}" ${en.teamName===e.teamName?'selected':''}>#${en.rank} — ${esc(en.teamName)}</option>`).join('');
  const puckBar=e.players.map(p=>{const w=(p.pucks/50)*100;const tm=TEAMS[p.team];return`<div style="width:${w}%;background:${p.alive?(tm?.c||'#3b82f6'):'#d1d5db'};opacity:${p.alive?1:0.5}" title="${esc(p.name)}: ${p.pucks}"></div>`;}).join('');
  const fw=e.players.filter(p=>p.position==='F'),df=e.players.filter(p=>p.position==='D');
  return`<div class="space-y-5">
    <select onchange="set({selTeam:this.value})" class="bg-white border border-gray-300 rounded-lg px-4 py-2 pr-8 text-sm font-medium text-gray-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 w-full sm:w-auto">${opts}</select>
    <div class="card p-5"><div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
      <div><div class="text-lg font-bold text-gray-900">${esc(e.teamName)}</div><div class="text-gray-400 text-sm">${esc(e.owner)}</div></div>
      <div class="flex gap-6"><div class="text-center"><div class="text-2xl font-bold font-mono text-gray-900">${e.totalScore.toLocaleString()}</div><div class="text-[11px] text-gray-400">Score</div></div><div class="text-center"><div class="text-2xl font-bold font-mono ${aliveColor(e.alive,e.totalPlayers)}">${e.alive}/${e.totalPlayers}</div><div class="text-[11px] text-gray-400">Alive</div></div><div class="text-center"><div class="text-2xl font-bold font-mono text-gray-500">${e.pucksUsed}/50</div><div class="text-[11px] text-gray-400">Pucks</div></div></div>
    </div><div class="flex gap-0.5 rounded-md overflow-hidden h-2.5">${puckBar}</div><div class="flex justify-between mt-1"><span class="text-[10px] text-gray-400">Puck allocation</span><span class="text-[10px] text-gray-400">50 total</span></div></div>
    ${pSection('Forwards',fw)}${pSection('Defense',df)}
  </div>`;
}

function pSection(title,players){
  const total=players.reduce((s,p)=>s+p.score,0);
  const rows=players.map(p=>`<tr class="border-b border-gray-50 trow">
    <td class="px-4 py-2"><div class="flex items-center gap-2"><span class="alive-dot" style="background:${p.alive?'#10b981':'#d1d5db'}"></span><span class="text-sm ${p.alive?'text-gray-900 font-medium':'text-gray-400'}">${esc(p.name)}</span>${!p.matched?'<span class="text-[9px] text-amber-500">?</span>':''}</div></td>
    <td class="px-3 py-2 text-center">${teamBadge(p.team)}</td>
    <td class="px-3 py-2 text-center text-sm text-gray-500 font-mono">${p.gp}</td>
    <td class="px-3 py-2 text-center text-sm text-gray-500 font-mono">${p.g}</td>
    <td class="px-3 py-2 text-center text-sm text-gray-500 font-mono">${p.a}</td>
    <td class="px-3 py-2 text-center text-sm text-gray-900 font-mono font-semibold">${p.pts}</td>
    <td class="px-3 py-2 text-center"><span class="text-xs font-semibold ${p.mult===2?'text-amber-600':p.mult===1.5?'text-blue-600':'text-gray-400'}">${p.mult}x</span></td>
    <td class="px-3 py-2 text-center"><div class="flex items-center justify-center gap-0.5">${puckDots(p.pucks)}</div></td>
    <td class="px-4 py-2 text-right"><span class="text-sm font-bold font-mono text-gray-900">${p.score.toLocaleString()}</span></td>
  </tr>`).join('');
  return`<div class="card overflow-hidden"><div class="flex items-center justify-between px-4 py-2.5 bg-gray-50 border-b border-gray-200"><span class="text-xs font-semibold text-gray-600 uppercase tracking-wider">${title}</span><span class="text-xs font-mono text-gray-500">${Math.round(total).toLocaleString()} pts</span></div><div class="overflow-x-auto"><table class="w-full"><thead><tr class="border-b border-gray-100"><th class="text-left text-[10px] font-medium text-gray-400 uppercase px-4 py-2">Player</th><th class="text-center text-[10px] font-medium text-gray-400 uppercase px-3 py-2">Team</th><th class="text-center text-[10px] font-medium text-gray-400 uppercase px-3 py-2">GP</th><th class="text-center text-[10px] font-medium text-gray-400 uppercase px-3 py-2">G</th><th class="text-center text-[10px] font-medium text-gray-400 uppercase px-3 py-2">A</th><th class="text-center text-[10px] font-medium text-gray-400 uppercase px-3 py-2">PTS</th><th class="text-center text-[10px] font-medium text-gray-400 uppercase px-3 py-2">MULT</th><th class="text-center text-[10px] font-medium text-gray-400 uppercase px-3 py-2">🏒</th><th class="text-right text-[10px] font-medium text-gray-400 uppercase px-4 py-2">SCORE</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

// ============================================================
// CHART TAB
// ============================================================
function renderChartTab(){
  const colors=['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899','#14b8a6','#6366f1'];
  const e=S.entries,mx=e[0]?.totalScore||1;
  const bars=e.map((en,i)=>`<div class="flex items-center gap-3 mb-2"><div class="w-32 sm:w-44 text-xs text-gray-500 truncate text-right flex-shrink-0">${esc(en.teamName)}</div><div class="flex-1 bar-bg"><div class="bar-fill" style="width:${Math.max(en.totalScore/mx*100,2)}%;background:${colors[i%colors.length]}"><span class="text-[11px] font-bold text-white">${en.totalScore.toLocaleString()}</span></div></div><span class="w-8 text-xs font-mono text-right flex-shrink-0 ${aliveColor(en.alive,en.totalPlayers)}">${en.alive}</span></div>`).join('');
  return`<div class="space-y-5">
    <div class="card p-5"><h3 class="text-sm font-semibold text-gray-700 mb-4">Score Comparison</h3>${bars}<div class="text-right text-[10px] text-gray-400 mt-1">Players alive →</div></div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5"><div class="card p-5"><h3 class="text-sm font-semibold text-gray-700 mb-3">By Position</h3><canvas id="posChart" height="260"></canvas></div><div class="card p-5"><h3 class="text-sm font-semibold text-gray-700 mb-3">By Multiplier Tier</h3><canvas id="multChart" height="260"></canvas></div></div>
  </div>`;
}

// ============================================================
// PLAYERS TAB
// ============================================================
function renderPlayersTab(){
  if(!S.stats)return'';
  let pl=S.stats.players.slice();
  if(S.pPos!=='all')pl=pl.filter(p=>p.pos===S.pPos);
  if(S.pSort==='avgScore')pl.sort((a,b)=>b.avgSc-a.avgSc);
  else if(S.pSort==='avgPucks')pl.sort((a,b)=>b.avgPk-a.avgPk);
  const fb=(v,id)=>`<button onclick="set({${id}:'${v}'})" class="px-3 py-1 rounded text-xs font-medium ${S[id]===v?'bg-gray-900 text-white':'text-gray-500 hover:text-gray-800'}">${v==='all'?'All':v==='F'?'Fwd':v==='D'?'Def':v==='ownership'?'Ownership':v==='avgScore'?'Avg Score':'Avg Pucks'}</button>`;
  const rows=pl.map(p=>`<tr class="border-b border-gray-50 trow"><td class="px-4 py-2 text-sm font-medium text-gray-900">${esc(p.name)}</td><td class="px-3 py-2 text-center text-xs font-semibold ${p.pos==='D'?'text-amber-600':'text-blue-600'}">${p.pos}</td><td class="px-3 py-2 text-center text-sm text-gray-500 font-mono">${p.count}/${S.entries.length}</td><td class="px-3 py-2 text-center"><div class="flex items-center gap-2 justify-center"><div class="w-14 h-1.5 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${p.own}%;background:${p.own===100?'#f59e0b':'#10b981'}"></div></div><span class="text-[11px] text-gray-400 font-mono">${p.own}%</span></div></td><td class="px-3 py-2 text-center text-sm text-orange-600 font-mono">${p.avgPk}</td><td class="px-3 py-2 text-right text-sm text-gray-600 font-mono">${p.avgSc}</td><td class="px-4 py-2 text-right text-sm font-bold text-gray-900 font-mono">${p.maxSc.toLocaleString()}</td></tr>`).join('');
  return`<div class="space-y-5">
    <div class="card p-5"><h3 class="text-sm font-semibold text-gray-700 mb-3">Ownership (Top 10)</h3><canvas id="ownChart" height="280"></canvas></div>
    <div class="flex flex-wrap gap-2"><div class="flex gap-0.5 bg-gray-100 rounded-lg p-0.5">${fb('all','pPos')}${fb('F','pPos')}${fb('D','pPos')}</div><div class="flex gap-0.5 bg-gray-100 rounded-lg p-0.5">${fb('ownership','pSort')}${fb('avgScore','pSort')}${fb('avgPucks','pSort')}</div></div>
    <div class="card overflow-hidden"><table class="w-full"><thead><tr class="bg-gray-50 border-b border-gray-200"><th class="text-left text-[10px] font-semibold text-gray-500 uppercase px-4 py-2">Player</th><th class="text-center text-[10px] font-semibold text-gray-500 uppercase px-3 py-2">Pos</th><th class="text-center text-[10px] font-semibold text-gray-500 uppercase px-3 py-2">Owned</th><th class="text-center text-[10px] font-semibold text-gray-500 uppercase px-3 py-2">Own%</th><th class="text-center text-[10px] font-semibold text-gray-500 uppercase px-3 py-2">Avg 🏒</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-3 py-2">Avg Score</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-4 py-2">Max Score</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

// ============================================================
// SIMULATION TAB
// ============================================================
function renderSimTab(){
  const c=S.simCfg;
  const si=(l,v,k)=>`<div><label class="text-xs text-gray-500 block mb-1">${l}</label><input type="number" value="${v}" onchange="updSim('${k}',this.value)" class="w-full bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-emerald-500"></div>`;
  const settings=S.showSim?`<div class="card p-5 space-y-3"><div class="text-xs font-semibold text-gray-600 mb-2">Parameters</div><div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">${si('Simulations',c.n,'n')}${si('Variance',c.v,'v')}${si('Fav Adv (1.0x)',c.adv[1.0],'a10')}${si('Mid Adv (1.5x)',c.adv[1.5],'a15')}${si('WC Adv (2.0x)',c.adv[2.0],'a20')}</div><button onclick="S.simCfg={n:1000,v:0.5,adv:{1.0:.6,1.5:.5,2.0:.35}};render()" class="text-xs text-gray-400 hover:text-gray-600 mt-1">Reset defaults</button></div>`:'';
  let results='';
  if(!S.simRes&&!S.simRun)results=`<div class="card p-12 text-center"><div class="text-3xl mb-2">🎲</div><p class="text-gray-500 text-sm">Run simulation to project final standings</p></div>`;
  else if(S.simRes){
    const pr=S.simRes;
    const winBars=pr.slice().sort((a,b)=>b.wp-a.wp).map((p,i)=>`<div class="flex items-center gap-3 mb-1.5"><div class="w-32 sm:w-44 text-xs text-gray-500 truncate text-right flex-shrink-0">${esc(p.tn)}</div><div class="flex-1 bar-bg h-5"><div class="bar-fill h-5" style="width:${Math.max(p.wp,1)}%;background:${i===0?'#f59e0b':i===1?'#9ca3af':'#10b981'}">${p.wp>=8?`<span class="text-[10px] font-bold text-white">${p.wp}%</span>`:''}</div></div>${p.wp<8?`<span class="text-[11px] font-mono text-gray-400 w-10 text-right">${p.wp}%</span>`:''}</div>`).join('');
    const trows=pr.map(p=>`<tr class="border-b border-gray-50 trow"><td class="px-4 py-2 text-sm font-medium text-gray-900">${esc(p.tn)}</td><td class="px-3 py-2 text-right text-sm font-mono text-gray-400">${p.cur.toLocaleString()}</td><td class="px-3 py-2 text-right text-sm font-mono font-bold text-gray-900">${p.mean.toLocaleString()}</td><td class="px-3 py-2 text-right text-sm font-mono text-gray-500">${p.med.toLocaleString()}</td><td class="px-3 py-2 text-right text-sm font-mono text-red-400">${p.p10.toLocaleString()}</td><td class="px-3 py-2 text-right text-sm font-mono text-emerald-600">${p.p90.toLocaleString()}</td><td class="px-4 py-2 text-right text-sm font-bold font-mono ${p.wp>=30?'text-amber-600':p.wp>=10?'text-blue-600':'text-gray-400'}">${p.wp}%</td></tr>`).join('');
    results=`<div class="card p-5"><h3 class="text-sm font-semibold text-gray-700 mb-3">Win Probability</h3>${winBars}</div><div class="card overflow-hidden"><div class="px-4 py-2.5 bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-600 uppercase tracking-wider">Projected Final Scores</div><table class="w-full"><thead><tr class="border-b border-gray-100"><th class="text-left text-[10px] font-medium text-gray-400 uppercase px-4 py-2">Team</th><th class="text-right text-[10px] font-medium text-gray-400 uppercase px-3 py-2">Current</th><th class="text-right text-[10px] font-medium text-gray-400 uppercase px-3 py-2">Mean</th><th class="text-right text-[10px] font-medium text-gray-400 uppercase px-3 py-2">Median</th><th class="text-right text-[10px] font-medium text-gray-400 uppercase px-3 py-2">10th</th><th class="text-right text-[10px] font-medium text-gray-400 uppercase px-3 py-2">90th</th><th class="text-right text-[10px] font-medium text-gray-400 uppercase px-4 py-2">Win%</th></tr></thead><tbody>${trows}</tbody></table></div><p class="text-gray-400 text-[11px] text-center mt-2">${c.n.toLocaleString()} sims · var ${c.v} · adv ${c.adv[1.0]}/${c.adv[1.5]}/${c.adv[2.0]}</p>`;
  }
  return`<div class="space-y-5"><div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3"><div><div class="text-base font-semibold text-gray-900">Monte Carlo Projections</div><div class="text-xs text-gray-400">Simulates remaining games using player pts/game and team advancement probability</div></div><div class="flex gap-2"><button onclick="set({showSim:!S.showSim})" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-xs font-medium text-gray-600">⚙ Settings</button><button onclick="doSim()" ${S.simRun?'disabled':''} class="px-4 py-1.5 bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white rounded-lg text-xs font-semibold">${S.simRun?'Running...':'▶ Run ('+c.n.toLocaleString()+')'}</button></div></div>${settings}${results}</div>`;
}

// ============================================================
// INFO TAB
// ============================================================
function renderInfoTab(){
  const pool=S.entries.length*CONFIG.entryFee;const pay=CONFIG.payoutSplit.map(p=>({...p,amt:Math.round(pool*p.pct)}));
  const tByM={};Object.entries(CONFIG.teamMultipliers).forEach(([t,m])=>{const k=m+'x';if(!tByM[k])tByM[k]=[];tByM[k].push(t);});
  let multH='<p class="text-gray-400 text-sm">Not yet assigned.</p>';
  if(Object.keys(CONFIG.teamMultipliers).length>0){
    multH=['2x','1.5x','1x'].filter(k=>tByM[k]?.length).map(tier=>{
      const m=parseFloat(tier);const label=m===2?'Wild Card':m===1?'Division Winners':'Middle Seeds';const color=m===2?'text-amber-600':m===1?'text-gray-500':'text-blue-600';
      const chips=(tByM[tier]||[]).sort().map(t=>{const al=CONFIG.teamsAlive.includes(t);return`<span class="inline-flex items-center gap-1 px-2 py-1 rounded text-xs font-medium ${al?'bg-gray-100 text-gray-800':'bg-gray-50 text-gray-300 line-through'}">${t}</span>`;}).join(' ');
      return`<div class="mb-3"><span class="text-sm font-bold font-mono ${color}">${tier}</span> <span class="text-xs text-gray-400">${label}</span><div class="flex flex-wrap gap-1.5 mt-1.5">${chips}</div></div>`;}).join('');
  }
  const ecards=S.entries.map(e=>`<div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg"><div><div class="text-sm font-medium text-gray-900">${esc(e.teamName)}</div><div class="text-xs text-gray-400">${esc(e.owner)}</div></div><div class="text-right"><div class="text-sm font-mono font-bold text-gray-900">${e.totalScore.toLocaleString()}</div><div class="text-[11px] text-gray-400">#${e.rank}</div></div></div>`).join('');
  const rl=(n,t)=>`<div class="flex gap-3 mb-3"><span class="flex-shrink-0 w-6 h-6 rounded-full bg-emerald-100 flex items-center justify-center text-xs font-bold text-emerald-700">${n}</span><p class="text-sm text-gray-700 pt-0.5">${t}</p></div>`;
  return`<div class="space-y-5">
    <div class="card p-5"><h3 class="text-sm font-semibold text-gray-900 mb-3">Rules</h3>${rl(1,`Pick ${CONFIG.forwards} forwards and ${CONFIG.defense} defensemen.`)}${rl(2,`Allocate ${CONFIG.totalPucks} pucks (min ${CONFIG.minPucks}, max ${CONFIG.maxPucks} per player).`)}${rl(3,'WC = 2.0x, middle = 1.5x, division winners = 1.0x.')}${rl(4,'<strong>Score = Playoff Points × Pucks × Multiplier</strong>')}${rl(5,`Entry fee: $${CONFIG.entryFee} ${CONFIG.currency}.`)}</div>
    <div class="card p-5"><h3 class="text-sm font-semibold text-gray-900 mb-3">Scoring Example</h3><div class="bg-gray-50 rounded-lg p-4 font-mono text-sm text-gray-600"><span class="text-gray-400">// McDavid, 6 pucks, EDM 1.5x, 10 pts</span><br>Score = <span class="text-blue-600">10</span> × <span class="text-amber-600">1.5</span> × <span class="text-orange-600">6</span> = <span class="text-gray-900 font-bold">90</span></div></div>
    <div class="card p-5"><h3 class="text-sm font-semibold text-gray-900 mb-3">Team Multipliers</h3>${multH}</div>
    <div class="card p-5"><h3 class="text-sm font-semibold text-gray-900 mb-3">Payouts</h3><div class="grid grid-cols-3 gap-3">${pay.map(p=>`<div class="text-center p-3 bg-gray-50 rounded-lg"><div class="w-8 h-8 mx-auto rounded-full flex items-center justify-center text-xs font-bold mb-1.5 ${p.place===1?'rank-1':p.place===2?'rank-2':'rank-3'}">${p.label}</div><div class="font-bold font-mono text-gray-900">$${p.amt}</div><div class="text-[11px] text-gray-400">${Math.round(p.pct*100)}%</div></div>`).join('')}</div><div class="text-xs text-gray-400 mt-2">Total: $${pool} (${S.entries.length} × $${CONFIG.entryFee})</div></div>
    <div class="card p-5"><h3 class="text-sm font-semibold text-gray-900 mb-3">Entries</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-2">${ecards}</div></div>
  </div>`;
}

// ============================================================
// CHARTS
// ============================================================
function renderCharts(){
  Object.values(S.charts).forEach(c=>c.destroy());S.charts={};
  const g={color:'#9ca3af',font:{family:'Inter',size:11}};const gr={color:'rgba(0,0,0,.04)'};
  if(S.tab==='chart'){
    const el1=document.getElementById('posChart');if(el1){const labels=S.entries.map(e=>e.teamName.length>12?e.teamName.slice(0,12)+'…':e.teamName);S.charts.pos=new Chart(el1,{type:'bar',data:{labels,datasets:[{label:'Forwards',data:S.entries.map(e=>Math.round(e.players.filter(p=>p.position==='F').reduce((s,p)=>s+p.score,0))),backgroundColor:'#3b82f6',borderRadius:4},{label:'Defense',data:S.entries.map(e=>Math.round(e.players.filter(p=>p.position==='D').reduce((s,p)=>s+p.score,0))),backgroundColor:'#f59e0b',borderRadius:4}]},options:{responsive:true,plugins:{legend:{labels:g}},scales:{x:{ticks:g,grid:gr},y:{ticks:g,grid:gr}}}});}
    const el2=document.getElementById('multChart');if(el2){const labels=S.entries.map(e=>e.teamName.length>12?e.teamName.slice(0,12)+'…':e.teamName);S.charts.mult=new Chart(el2,{type:'bar',data:{labels,datasets:[{label:'1.0x',data:S.entries.map(e=>Math.round(e.players.filter(p=>p.mult===1).reduce((s,p)=>s+p.score,0))),backgroundColor:'#d1d5db',borderRadius:4},{label:'1.5x',data:S.entries.map(e=>Math.round(e.players.filter(p=>p.mult===1.5).reduce((s,p)=>s+p.score,0))),backgroundColor:'#3b82f6',borderRadius:4},{label:'2.0x',data:S.entries.map(e=>Math.round(e.players.filter(p=>p.mult===2).reduce((s,p)=>s+p.score,0))),backgroundColor:'#f59e0b',borderRadius:4}]},options:{responsive:true,plugins:{legend:{labels:g}},scales:{x:{stacked:true,ticks:g,grid:gr},y:{stacked:true,ticks:g,grid:gr}}}});}
  }
  if(S.tab==='players'){
    const el=document.getElementById('ownChart');if(el&&S.stats){const top=S.stats.players.slice(0,10);S.charts.own=new Chart(el,{type:'bar',data:{labels:top.map(p=>p.name.split(' ').pop()),datasets:[{data:top.map(p=>p.own),backgroundColor:top.map(p=>p.own===100?'#f59e0b':'#10b981'),borderRadius:4}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}% ownership`}}},scales:{x:{ticks:{...g,callback:v=>v+'%'},grid:gr},y:{ticks:{...g,color:'#374151',font:{size:12,weight:'500'}},grid:{display:false}}}}});}
  }
}

// ============================================================
// ACTIONS
// ============================================================
function bindAll(){}
function updSim(k,v){const f=parseFloat(v);if(k==='n')S.simCfg.n=Math.max(100,parseInt(v)||1000);else if(k==='v')S.simCfg.v=Math.max(0,Math.min(2,f||0.5));else if(k==='a10')S.simCfg.adv[1.0]=f;else if(k==='a15')S.simCfg.adv[1.5]=f;else if(k==='a20')S.simCfg.adv[2.0]=f;render();}
function doSim(){set({simRun:true});setTimeout(()=>{set({simRes:runSim(S.entries,S.simCfg),simRun:false});},50);}

document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh"><div style="text-align:center"><div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#1a1f2e,#2d3748);display:flex;align-items:center;justify-content:center;color:#10b981;font-weight:800;font-size:20px;margin:0 auto 16px;font-family:Inter">50</div><p style="color:#9ca3af;font-size:14px">Loading playoff stats...</p></div></div>';
window.addEventListener('DOMContentLoaded',()=>{loadData();});
if(document.readyState!=='loading'){loadData();}
