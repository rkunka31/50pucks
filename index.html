function calcScores(entries,lu){
  const sc=entries.map(e=>{
    let tot=0,alv=0,pkRem=0,bn=null,wn=null,bs=-1e9,ws=1e9;
    const pl=e.players.map(p=>{
      const s=mp(p.name,lu);const pts=s?.pts||0,g=s?.g||0,a=s?.a||0,gp=s?.gp||0;
      const m=mt(p.team),ia=al(p.team),score=pts*m*p.pucks;
      if(ia){alv++;pkRem+=p.pucks;}
      tot+=score;
      if(score>bs){bs=score;bn=p.name;}
      if(score<ws){ws=score;wn=p.name;}
      return{...p,pts,g,a,gp,mult:m,score:Math.round(score*10)/10,alive:ia,matched:!!s};
    });
    const fw=pl.filter(p=>p.position==='F').sort((a,b)=>b.score-a.score);
    const df=pl.filter(p=>p.position==='D').sort((a,b)=>b.score-a.score);
    return{...e,players:[...fw,...df],total:Math.round(tot*10)/10,alive:alv,count:pl.length,pkRem,pkUsed:pl.reduce((s,p)=>s+p.pucks,0),bp:bn,bs:Math.round(bs*10)/10,wp:wn,ws:Math.round(ws*10)/10};
  });
  sc.sort((a,b)=>b.total-a.total);
  let r=1;for(let i=0;i<sc.length;i++){if(i>0&&sc[i].total<sc[i-1].total)r=i+1;sc[i].rank=r;}
  return sc;
}

function poolStats(en){
  const pop=new Map();
  for(const e of en)for(const p of e.players){
    if(!pop.has(p.name))pop.set(p.name,{c:0,tp:0,sc:[],pos:p.position,team:p.team,pts:p.pts,gp:p.gp,g:p.g,a:p.a,alive:p.alive});
    const o=pop.get(p.name);o.c++;o.tp+=p.pucks;o.sc.push(p.score);
    if(p.pts>o.pts){o.pts=p.pts;o.gp=p.gp;o.g=p.g;o.a=p.a;o.alive=p.alive;}
  }
  const pl=[...pop.entries()].map(([n,d])=>({name:n,pos:d.pos,team:d.team,pts:d.pts,gp:d.gp,g:d.g,a:d.a,alive:d.alive,c:d.c,tp:d.tp,ap:Math.round(d.tp/d.c*10)/10,as:Math.round(d.sc.reduce((a,b)=>a+b,0)/d.c*10)/10,ms:Math.max(...d.sc),own:Math.round(d.c/en.length*100)})).sort((a,b)=>b.c-a.c||b.as-a.as);
  let gB=null,gW=null;
  for(const e of en)for(const p of e.players){if(!gB||p.score>gB.score)gB={...p,tn:e.teamName};if(!gW||p.score<gW.score)gW={...p,tn:e.teamName};}
  // Efficiency: score per puck
  const efficiency=en.map(e=>({name:e.teamName,eff:e.pkUsed>0?Math.round(e.total/e.pkUsed*10)/10:0})).sort((a,b)=>b.eff-a.eff);
  return{n:en.length,pool:en.length*sn().entryFee,pl,gB,gW,efficiency,avg:en.length?Math.round(en.reduce((s,e)=>s+e.total,0)/en.length):0};
}

// ============================================================
// SIMULATION
// ============================================================
function runSim(en,cfg){const ns=cfg.n||1000,res=new Map();en.forEach(e=>res.set(e.teamName,[]));for(let s=0;s<ns;s++)for(const e of en){let t=0;for(const p of e.players)t+=simP(p,cfg)*p.mult*p.pucks;res.get(e.teamName).push(Math.round(t*10)/10);}const pr=en.map(e=>{const sm=res.get(e.teamName).sort((a,b)=>a-b);return{tn:e.teamName,cur:e.total,mn:Math.round(sm.reduce((a,b)=>a+b,0)/sm.length),md:Math.round(sm[~~(sm.length*.5)]),p10:Math.round(sm[~~(sm.length*.1)]),p90:Math.round(sm[~~(sm.length*.9)])};});const wn=new Map();en.forEach(e=>wn.set(e.teamName,0));for(let s=0;s<ns;s++){let b='',bv=-1e9;for(const[tn,sm]of res)if(sm[s]>bv){bv=sm[s];b=tn;}wn.set(b,(wn.get(b)||0)+1);}pr.forEach(p=>p.wp=Math.round(wn.get(p.tn)/ns*1000)/10);pr.sort((a,b)=>b.mn-a.mn);return pr;}
function simP(p,cfg){const cur=p.pts||0,gp=p.gp||0;if(!p.alive)return cur;const ppg=gp>0?cur/gp:.5;const adv=cfg.adv?.[p.mult]??.5;let rem=Math.max(0,Math.min(3,7-(gp%7)));for(let r=0;r<3;r++){if(Math.random()<adv)rem+=4+~~(Math.random()*4);else break;}let f=0;for(let g=0;g<rem;g++){f+=pois(Math.max(0,ppg+gauss()*ppg*(cfg.v||.5)));}return cur+f;}
function gauss(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function pois(l){if(l<=0)return 0;const L=Math.exp(-l);let k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}

  if(!S.simRes&&!S.simRun)res=`<div class="card p-8 text-center"><p class="text-gray-400 text-sm">Click Run to project final standings</p></div>`;
  else if(S.simRes){const pr=S.simRes;res=`
    <div class="card p-4"><h3 class="text-sm font-semibold text-gray-700 mb-3">Win Probability</h3>${pr.slice().sort((a,b)=>b.wp-a.wp).map((p,i)=>`<div class="flex items-center gap-2 mb-1.5"><div class="w-28 sm:w-40 text-[11px] text-gray-500 truncate text-right flex-shrink-0">${esc(p.tn)}</div><div class="flex-1 bar-bg h-5"><div class="bar-f h-5" style="width:${Math.max(p.wp,1)}%;background:${i===0?'#f59e0b':i===1?'#9ca3af':'#10b981'}">${p.wp>=8?`<span class="text-[10px] font-bold text-white">${p.wp}%</span>`:''}</div></div>${p.wp<8?`<span class="text-[11px] text-gray-400 w-9 text-right num">${p.wp}%</span>`:''}</div>`).join('')}</div>
    <div class="card"><table class="w-full"><thead><tr class="bg-gray-50 border-b border-gray-200"><th class="text-left text-[10px] font-semibold text-gray-500 uppercase px-3 py-2">Team</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">Current</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">Mean</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">Median</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">10th</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">90th</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-3 py-2">Win%</th></tr></thead><tbody>${pr.map(p=>`<tr class="border-b border-gray-50 trow"><td class="px-3 py-2 text-sm font-medium text-gray-900">${esc(p.tn)}</td><td class="px-2 py-2 text-right text-sm text-gray-400 num">${fmt(p.cur)}</td><td class="px-2 py-2 text-right text-sm font-bold text-gray-900 num">${fmt(p.mn)}</td><td class="px-2 py-2 text-right text-sm text-gray-500 num">${fmt(p.md)}</td><td class="px-2 py-2 text-right text-sm text-red-400 num">${fmt(p.p10)}</td><td class="px-2 py-2 text-right text-sm text-emerald-600 num">${fmt(p.p90)}</td><td class="px-3 py-2 text-right text-sm font-bold num ${p.wp>=30?'text-amber-600':p.wp>=10?'text-blue-600':'text-gray-400'}">${p.wp}%</td></tr>`).join('')}</tbody></table></div>`;}
  return`<div class="space-y-4"><div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3"><div><div class="font-semibold text-gray-900">Monte Carlo Projections</div><div class="text-xs text-gray-400">Player pts/game × team advancement probability</div></div><div class="flex gap-2"><button onclick="set({showSim:!S.showSim})" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded text-xs font-medium text-gray-600">⚙</button><button onclick="doSim()" ${S.simRun?'disabled':''} class="px-4 py-1.5 bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white rounded text-xs font-semibold">${S.simRun?'Running...':'▶ Run ('+c.n.toLocaleString()+')'}</button></div></div>${stg}${res}</div>`;
}

// ============================================================
// POOL INFO
// ============================================================
function IN(){
  const pool=S.stats?.pool||0;const pay=CONFIG.payoutSplit.map(p=>({...p,amt:Math.round(pool*p.pct)}));
  const ms=sn().multipliers;const tByM={};Object.entries(ms).forEach(([t,m])=>{const k=m+'x';if(!tByM[k])tByM[k]=[];tByM[k].push(t);});
  const mH=Object.keys(ms).length?['2x','1.5x','1x'].filter(k=>tByM[k]?.length).map(tier=>{const m=parseFloat(tier);const lbl=m===2?'Wild Card':m===1?'Div Winners':'Middle';const cl=m===2?'text-amber-600':m===1?'text-gray-500':'text-blue-600';return`<div class="mb-2"><span class="text-sm font-bold ${cl}">${tier}</span> <span class="text-xs text-gray-400">${lbl}</span><div class="flex flex-wrap gap-1 mt-1">${(tByM[tier]||[]).sort().map(t=>`<span class="px-2 py-0.5 rounded text-xs font-medium ${sn().alive.includes(t)?'bg-gray-100 text-gray-800':'bg-gray-50 text-gray-300 line-through'}">${t}</span>`).join('')}</div></div>`;}).join(''):'<p class="text-gray-400 text-sm">Not yet assigned.</p>';
  const rl=(n,t)=>`<div class="flex gap-2 mb-2"><span class="w-5 h-5 rounded-full bg-emerald-100 flex items-center justify-center text-[10px] font-bold text-emerald-700 flex-shrink-0">${n}</span><p class="text-sm text-gray-700">${t}</p></div>`;
  return`<div class="space-y-4">
    <div class="card p-4">${rl(1,`Pick ${CONFIG.fwd}F + ${CONFIG.def}D.`)}${rl(2,`Allocate ${CONFIG.totalPucks} pucks (min ${CONFIG.minPk}, max ${CONFIG.maxPk}).`)}${rl(3,'WC = 2.0x, middle = 1.5x, div winners = 1.0x.')}${rl(4,'<strong>Score = Points × Pucks × Multiplier</strong>')}${rl(5,`$${sn().entryFee} ${CONFIG.currency} per entry.`)}</div>
    <div class="card p-4"><h3 class="text-sm font-semibold text-gray-900 mb-2">Multipliers (${S.year})</h3>${mH}</div>
    <div class="card p-4"><h3 class="text-sm font-semibold text-gray-900 mb-2">Payouts</h3><div class="flex gap-4">${pay.map(p=>`<div class="text-center"><div class="w-8 h-8 mx-auto rounded-full flex items-center justify-center text-xs font-bold mb-1 ${p.place===1?'r1':p.place===2?'r2':'r3'}">${p.label}</div><div class="font-bold text-gray-900 num">$${p.amt}</div></div>`).join('')}</div></div>
    <div class="card p-4"><h3 class="text-sm font-semibold text-gray-900 mb-2">Entries</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-2">${S.entries.map(e=>`<div class="flex items-center justify-between p-2.5 bg-gray-50 rounded"><div><div class="text-sm font-medium text-gray-900">${esc(e.teamName)}</div><div class="text-[11px] text-gray-400">${esc(e.owner)}</div></div><div class="text-right"><div class="text-sm font-bold text-gray-900 num">${fmt(e.total)}</div><div class="text-[10px] text-gray-400">#${e.rank} · ${e.pkRem} pucks left</div></div></div>`).join('')}</div></div>
  </div>`;
}

// ============================================================
// CHART.JS — 6 interactive charts
// ============================================================
function drawCharts(){
  const tx={color:'#999',font:{family:'Inter',size:10}};const gr={color:'rgba(0,0,0,.04)'};
  const e=S.entries;const labels=e.map(x=>x.teamName.length>13?x.teamName.slice(0,13)+'…':x.teamName);

  if(S.tab==='chart'){
    // 1. Score by Position (stacked bar)
    let el=document.getElementById('c_score');if(el)S.charts.s=new Chart(el,{type:'bar',data:{labels,datasets:[{label:'Forwards',data:e.map(x=>Math.round(x.players.filter(p=>p.position==='F').reduce((s,p)=>s+p.score,0))),backgroundColor:'#3b82f6',borderRadius:3},{label:'Defense',data:e.map(x=>Math.round(x.players.filter(p=>p.position==='D').reduce((s,p)=>s+p.score,0))),backgroundColor:'#f59e0b',borderRadius:3}]},options:{responsive:true,plugins:{legend:{labels:tx},tooltip:{mode:'index',intersect:false}},scales:{x:{stacked:true,ticks:tx,grid:gr},y:{stacked:true,ticks:tx,grid:gr}}}});

    // 2. Pucks Remaining vs Score (scatter/bubble)
    el=document.getElementById('c_scatter');if(el)S.charts.sc=new Chart(el,{type:'bubble',data:{datasets:[{label:'Entries',data:e.map((x,i)=>({x:x.pkRem,y:x.total,r:Math.max(x.alive*1.5,4),label:x.teamName})),backgroundColor:e.map((_,i)=>COLORS[i%COLORS.length]+'88'),borderColor:e.map((_,i)=>COLORS[i%COLORS.length]),borderWidth:1.5}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${e[c.dataIndex].teamName}: ${fmt(e[c.dataIndex].total)} pts, ${e[c.dataIndex].pkRem} pucks left`}}},scales:{x:{title:{display:true,text:'Pucks Remaining',font:{size:11},color:'#888'},ticks:tx,grid:gr},y:{title:{display:true,text:'Total Score',font:{size:11},color:'#888'},ticks:tx,grid:gr}}}});

    // 3. Score by Multiplier Tier (stacked)
    el=document.getElementById('c_mult');if(el)S.charts.m=new Chart(el,{type:'bar',data:{labels,datasets:[{label:'1.0x (Favs)',data:e.map(x=>Math.round(x.players.filter(p=>p.mult===1).reduce((s,p)=>s+p.score,0))),backgroundColor:'#d1d5db',borderRadius:3},{label:'1.5x (Mid)',data:e.map(x=>Math.round(x.players.filter(p=>p.mult===1.5).reduce((s,p)=>s+p.score,0))),backgroundColor:'#3b82f6',borderRadius:3},{label:'2.0x (WC)',data:e.map(x=>Math.round(x.players.filter(p=>p.mult===2).reduce((s,p)=>s+p.score,0))),backgroundColor:'#f59e0b',borderRadius:3}]},options:{responsive:true,plugins:{legend:{labels:tx},tooltip:{mode:'index',intersect:false}},scales:{x:{stacked:true,ticks:tx,grid:gr},y:{stacked:true,ticks:tx,grid:gr}}}});

    // 4. Efficiency: points per puck
    el=document.getElementById('c_eff');if(el){const eff=e.map(x=>({name:x.teamName.length>13?x.teamName.slice(0,13)+'…':x.teamName,v:x.pkUsed>0?Math.round(x.total/x.pkUsed*10)/10:0})).sort((a,b)=>b.v-a.v);S.charts.e=new Chart(el,{type:'bar',data:{labels:eff.map(x=>x.name),datasets:[{data:eff.map(x=>x.v),backgroundColor:eff.map((_,i)=>COLORS[i%COLORS.length]),borderRadius:3}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} pts/puck`}}},scales:{x:{ticks:{...tx,callback:v=>v+' pts/pk'},grid:gr},y:{ticks:{...tx,color:'#374151',font:{size:11,weight:'500'}},grid:{display:false}}}}});}

    // 5. Score from Alive vs Eliminated players
    el=document.getElementById('c_alive');if(el)S.charts.a=new Chart(el,{type:'bar',data:{labels,datasets:[{label:'Alive',data:e.map(x=>Math.round(x.players.filter(p=>p.alive).reduce((s,p)=>s+p.score,0))),backgroundColor:'#10b981',borderRadius:3},{label:'Eliminated',data:e.map(x=>Math.round(x.players.filter(p=>!p.alive).reduce((s,p)=>s+p.score,0))),backgroundColor:'#ef4444',borderRadius:3}]},options:{responsive:true,plugins:{legend:{labels:tx},tooltip:{mode:'index',intersect:false}},scales:{x:{stacked:true,ticks:tx,grid:gr},y:{stacked:true,ticks:tx,grid:gr}}}});

    // 6. NHL Team Exposure — which NHL teams are contestants betting on
    el=document.getElementById('c_team');if(el){const teamPk=new Map();for(const en of e)for(const p of en.players){const t=p.team;teamPk.set(t,(teamPk.get(t)||0)+p.pucks);}const sorted=[...teamPk.entries()].sort((a,b)=>b[1]-a[1]).slice(0,12);S.charts.t=new Chart(el,{type:'doughnut',data:{labels:sorted.map(x=>x[0]),datasets:[{data:sorted.map(x=>x[1]),backgroundColor:sorted.map(x=>(TM[x[0]]?.c||'#666')+'cc'),borderWidth:1,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'right',labels:{...tx,boxWidth:12,padding:8}},tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw} pucks (${Math.round(c.raw/e.reduce((s,en)=>s+en.pkUsed,0)*100)}%)`}}}}});}
  }

  if(S.tab==='players'){
    const el=document.getElementById('c_own');if(el&&S.stats){const top=S.stats.pl.slice(0,12);S.charts.o=new Chart(el,{type:'bar',data:{labels:top.map(p=>p.name.split(' ').pop()),datasets:[{label:'Ownership %',data:top.map(p=>p.own),backgroundColor:top.map(p=>p.own===100?'#f59e0b':'#10b981'),borderRadius:3},{label:'Avg Score',data:top.map(p=>p.as),backgroundColor:'#3b82f6aa',borderRadius:3}]},options:{responsive:true,plugins:{legend:{labels:tx},tooltip:{mode:'index',intersect:false}},scales:{x:{ticks:tx,grid:gr},y:{ticks:tx,grid:gr}}}});}
  }
}

// ============================================================
// ACTIONS
// ============================================================
function updSim(k,v){const f=parseFloat(v);if(k==='n')S.simCfg.n=Math.max(100,parseInt(v)||1000);else if(k==='v')S.simCfg.v=f;else if(k==='a1')S.simCfg.adv[1]=f;else if(k==='a15')S.simCfg.adv[1.5]=f;else if(k==='a2')S.simCfg.adv[2]=f;render();}
function doSim(){set({simRun:true});setTimeout(()=>{set({simRes:runSim(S.entries,S.simCfg),simRun:false});},50);}

// BOOT
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',loadData);}else{loadData();}
</script>
