<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>50 Pucks - NHL Playoff Pool</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div id="app"></div>

  <script>
    // State
    const S = {yr: 2026, tab: 'entry', _nhlStats: null};

    // Fallback player data for 2026
    function fallback2026() {
      return [
        {id:1,name:'Connor McDavid',team:'EDM',pos:'F',gp:80,g:47,a:86,pts:133},
        {id:2,name:'Nikita Kucherov',team:'TBL',pos:'F',gp:74,g:43,a:85,pts:128},
        {id:3,name:'Nathan MacKinnon',team:'COL',pos:'F',gp:78,g:52,a:74,pts:126},
        {id:4,name:'Nick Suzuki',team:'MTL',pos:'F',gp:81,g:29,a:72,pts:101},
        {id:5,name:'Martin Nečas',team:'COL',pos:'F',gp:76,g:38,a:61,pts:99},
        {id:6,name:'David Pastrňák',team:'BOS',pos:'F',gp:76,g:29,a:70,pts:99},
        {id:7,name:'Leon Draisaitl',team:'EDM',pos:'F',gp:65,g:35,a:62,pts:97},
        {id:8,name:'Jason Robertson',team:'DAL',pos:'F',gp:80,g:44,a:50,pts:94},
        {id:9,name:'Evan Bouchard',team:'EDM',pos:'D',gp:80,g:21,a:70,pts:91},
        {id:10,name:'Kirill Kaprizov',team:'MIN',pos:'F',gp:78,g:45,a:44,pts:89},
        {id:11,name:'Cole Caufield',team:'MTL',pos:'F',gp:80,g:51,a:37,pts:88},
        {id:12,name:'Jake Guentzel',team:'TBL',pos:'F',gp:80,g:37,a:50,pts:87},
        {id:13,name:'Matt Boldy',team:'MIN',pos:'F',gp:76,g:42,a:43,pts:85},
        {id:14,name:'Wyatt Johnston',team:'DAL',pos:'F',gp:80,g:44,a:41,pts:85},
        {id:15,name:'Clayton Keller',team:'UTA',pos:'F',gp:80,g:26,a:59,pts:85},
        {id:16,name:'Jack Eichel',team:'VGK',pos:'F',gp:72,g:26,a:58,pts:84},
        {id:17,name:'Tim Stützle',team:'OTT',pos:'F',gp:80,g:34,a:49,pts:83},
        {id:18,name:'Artemi Panarin',team:'LAK',pos:'F',gp:75,g:28,a:55,pts:83},
        {id:19,name:'Sebastian Aho',team:'CAR',pos:'F',gp:79,g:27,a:53,pts:80},
        {id:20,name:'Mitch Marner',team:'VGK',pos:'F',gp:79,g:23,a:56,pts:79}
      ];
    }

    // Get alive teams for 2026
    const alive2026 = ['BUF','BOS','MTL','TBL','CAR','OTT','PIT','COL','DAL','MIN','EDM','UTA','VGK','PHI','ANA','LAK'];

    // Build player list by team and position
    function buildPlayerList(stats) {
      const byTeam = {};
      for (const p of stats) {
        if (!byTeam[p.team]) byTeam[p.team] = {F: [], D: []};
        if (p.pos === 'D') byTeam[p.team].D.push(p);
        else byTeam[p.team].F.push(p);
      }

      const result = {};
      for (const team in byTeam) {
        const fwd = byTeam[team].F.sort((a,b) => (b.pts/b.gp) - (a.pts/a.gp)).slice(0,6);
        const def = byTeam[team].D.sort((a,b) => (b.pts/b.gp) - (a.pts/a.gp)).slice(0,4);
        result[team] = [...fwd, ...def];
      }
      return result;
    }

    // Render the app
    function render() {
      const app = document.getElementById('app');
      const stats = S._nhlStats || [];
      const playersByTeam = buildPlayerList(stats);

      let playerOptions = '';
      for (const team of alive2026) {
        if (playersByTeam[team]) {
          for (const p of playersByTeam[team]) {
            playerOptions += `<option value="${p.name} – ${p.team}">${p.name} – ${p.team} (${(p.pts/p.gp).toFixed(2)} PPG)</option>`;
          }
        }
      }

      app.innerHTML = `
        <div class="max-w-4xl mx-auto p-4">
          <header class="mb-6">
            <h1 class="text-2xl font-bold text-slate-900">50 Pucks - 2026 Playoff Pool</h1>
            <p class="text-slate-600">Pick 10 forwards + 5 defensemen, allocate 50 pucks</p>
          </header>

          <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-semibold mb-4">Enter Your Team</h2>

            <div class="grid grid-cols-2 gap-4 mb-6">
              <div>
                <label class="block text-sm font-medium mb-1">Team Name</label>
                <input type="text" id="teamName" placeholder="e.g., THE ROBFATHER" class="w-full px-3 py-2 border border-slate-300 rounded">
              </div>
              <div>
                <label class="block text-sm font-medium mb-1">Your Name</label>
                <input type="text" id="ownerName" placeholder="e.g., Rob" class="w-full px-3 py-2 border border-slate-300 rounded">
              </div>
            </div>

            <div class="mb-6">
              <label class="block text-sm font-medium mb-2">Select 10 Forwards</label>
              <select id="forwards" multiple size="8" class="w-full px-3 py-2 border border-slate-300 rounded">
                <option disabled>-- Select forwards --</option>
                ${playerOptions}
              </select>
            </div>

            <div class="mb-6">
              <label class="block text-sm font-medium mb-2">Select 5 Defensemen</label>
              <select id="defensemen" multiple size="4" class="w-full px-3 py-2 border border-slate-300 rounded">
                <option disabled>-- Select defensemen --</option>
                ${playerOptions}
              </select>
            </div>

            <button onclick="alert('Entry saved!')" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
              Submit Entry
            </button>
          </div>

          <div class="mt-6 text-sm text-slate-500">
            <p>✓ Players loaded: ${stats.length} total</p>
            <p>✓ Teams available: ${alive2026.length}</p>
          </div>
        </div>
      `;
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', function() {
      S._nhlStats = fallback2026();
      render();
    });
  </script>
</body>
</html>
