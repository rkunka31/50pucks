const TM={ANA:'#F47A38',BOS:'#FFB81C',BUF:'#003087',CGY:'#D2001C',CAR:'#CC0000',CHI:'#CF0A2C',COL:'#6F263D',CBJ:'#002654',DAL:'#006847',DET:'#CE1126',EDM:'#FF4C00',FLA:'#C8102E',LAK:'#A2AAAD',MIN:'#154734',MTL:'#AF1E2D',NSH:'#FFB81C',NJD:'#CE1126',NYI:'#00539B',NYR:'#0038A8',OTT:'#C52032',PHI:'#F74902',PIT:'#FCB514',SJS:'#006D75',SEA:'#001628',STL:'#002F87',TBL:'#002868',TOR:'#00205B',UTA:'#71AFE5',VAN:'#00205B',VGK:'#B4975A',WSH:'#041E42',WPG:'#041E42'};

function nm(a){if(!a)return'';const u=a.toUpperCase().trim();return AM[u]||u;}
function sn(){return SEASONS[S.yr]||SEASONS[2025];}
function isLive(){const d=sn().liveAt;return!d||new Date()>=new Date(d);}
function mt(t){return sn().mult[nm(t)]??1.0;}

// Build player lists by PPG: top 6 forwards and top 4 defensemen per team
function buildPlayerListByPPG(stats){
  const byTeam={};for(const p of stats){if(!byTeam[p.team])byTeam[p.team]={F:[],D:[]};if(p.pos==='D')byTeam[p.team].D.push(p);else byTeam[p.team].F.push(p);}
  const result={};for(const team in byTeam){const fwd=byTeam[team].F.sort((a,b)=>(b.gp>0?b.pts/b.gp:0)-(a.gp>0?a.pts/a.gp:0)).slice(0,6);const def=byTeam[team].D.sort((a,b)=>(b.gp>0?b.pts/b.gp:0)-(a.gp>0?a.pts/a.gp:0)).slice(0,4);result[team]=[...fwd,...def];}
  return result;
}
// Get teams that are alive (not mathematically eliminated)
function getAliveTeams(){
  const season=sn();
  return season.alive.length>0?season.alive:ALL_TEAMS;
}

function snapshotScores(){
  if(!S.entries||!S.entries.length)return;
  const today=new Date().toISOString().slice(0,10);
  const label=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});

  if(idx>=0)_history[idx]={d:today,l:label,s:snap};
  else _history.push({d:today,l:label,s:snap});
  saveHistory();
}

function parseRosterCSV(csv){
  // Parse Hockey-Reference CSV with multi-team player handling
  // For multi-team players, uses LAST team occurrence (post-trade team)
  
  const lines=csv.trim().split('\n');
  const players=new Map(); // Track all occurrences - last one wins
  
  let i=0;
  // Skip header comments
  while(i<lines.length&&!lines[i].includes('Rk,Player')){i++;}
  i++; // Skip header line
  
  while(i<lines.length){
    const line=lines[i].trim();
    if(!line||line.startsWith('League Average'))break;
    
    const cols=line.split(',').map(c=>c.trim());
    if(cols.length<10)continue;
    
    const rk=cols[0];
    const name=cols[1];
    const team=cols[3];
    const pos=cols[4];
    const gp=parseInt(cols[5])||0;
    const g=parseInt(cols[6])||0;
    const a=parseInt(cols[7])||0;
    const pts=parseInt(cols[8])||0;
    
    // Skip goalie and non-skaters
    if(pos==='G'||!name||name==='Player')continue;
    
    // Skip 2TM/3TM rows (totals) - we'll use individual team rows instead
    if(team.match(/^\d+TM$/)){
      i++;
      continue;
    }
    
    // Process individual team rows
    if(team.match(/^[A-Z]{2,3}$/)){
      const key=name.toLowerCase();
      // For multi-team players, this overwrites with the latest (last) team
      players.set(key,{
        name,
        team:nm(team),
        pos:pos[0]||'F',
        gp,g,a,pts,
        _src:'Roster Lock'
      });
    }
    i++;
  }
  
  const roster=Array.from(players.values());
  return roster.length>0?roster:null;
}


function validateHockeyRefCSV(csv,players){
  const issues=[];
  
  // Check player count
  if(players.length<DATA_VALIDATION.minPlayers){
    issues.push(`❌ Only ${players.length} players (need ≥${DATA_VALIDATION.minPlayers})`);
  }
  
  // Check for invalid teams
  const invalidTeams=new Set();
  for(const p of players){
    if(!DATA_VALIDATION.validTeams.includes(p.team)){
      invalidTeams.add(p.team);
    }
  }
  if(invalidTeams.size>0){
    issues.push(`❌ Invalid teams: ${Array.from(invalidTeams).join(', ')}`);
  }
  
  // Check team roster sizes
  const teamCounts={};
  for(const p of players){
    teamCounts[p.team]=(teamCounts[p.team]||0)+1;
  }
  const oversizedTeams=Object.entries(teamCounts).filter(([t,c])=>c>DATA_VALIDATION.maxPlayersPerTeam);
  if(oversizedTeams.length>0){
    issues.push(`❌ Teams with too many players: ${oversizedTeams.map(([t,c])=>`${t}(${c})`).join(', ')}`);
  }
  
  // Check top scorer
  const topScorer=players[0];
  if(!topScorer || topScorer.pts<DATA_VALIDATION.minPointsLeader){
    issues.push(`❌ Top scorer has only ${topScorer?.pts||0} points (need ≥${DATA_VALIDATION.minPointsLeader})`);
  }
  
  // Check for duplicate names
  const names=new Map();
  const dups=[];
  for(const p of players){
    if(names.has(p.name)){dups.push(p.name);}
    names.set(p.name,true);
  }
  if(dups.length>0){
    issues.push(`⚠️ ${dups.length} duplicate names (may be multi-team players)`);
  }
  
  // Check for missing critical stats
  const missingStats=players.filter(p=>!p.gp||p.gp<1||!p.pts).length;
  if(missingStats>0){
    issues.push(`⚠️ ${missingStats} players missing games played or points`);
  }
  
  return {valid:issues.length===0,issues,warnings:issues.filter(i=>i.startsWith('⚠️')),errors:issues.filter(i=>i.startsWith('❌'))};
}

async function fetchPlayoffStats(){
  // Fetch live playoff stats from NHL API (game_type=3)
  try{
    const r=await fetch('https://api-web.nhle.com/v1/skater-stats-leaders/20252026/3?categories=points,goals,assists&limit=-1');
    if(r.ok){
      const d=await r.json();
      const stats=new Map();
      const processCategory=(list,category)=>{
        if(!list)return;
        for(const p of list){
          const id=p.id;
          if(!stats.has(id))stats.set(id,{
            id,
            name:`${p.firstName?.default||''} ${p.lastName?.default||''}`.trim(),
            team:nm(p.teamAbbrev?.default||''),
            pts:0,g:0,a:0,_s:'NHL Playoff API'
          });
          const entry=stats.get(id);
          if(category==='points')entry.pts=p.value||0;
          if(category==='goals')entry.g=p.value||0;
          if(category==='assists')entry.a=p.value||0;
        }
      };
      processCategory(d.points,'points');
      processCategory(d.goals,'goals');
      processCategory(d.assists,'assists');

      playoffStats=[...stats.values()];
      return true;
    }
  }catch(e){
    console.error('Playoff fetch error:',e);
  }
  return false;
}

async function fetchEntriesFromSheet(){
  // Fetch the published CSV URL directly — Google CDN has proper CORS headers, no GAS needed for reads
  const sheetUrl=sn().sheetUrl;
  if(!sheetUrl){alert('❌ No sheet URL configured');return false;}

  try{
    const r=await fetch(sheetUrl);
    if(!r.ok){alert(`❌ Sheet fetch failed (HTTP ${r.status})`);return false;}

    const csv=await r.text();
    const entries=parseEntriesCSV(csv);

    // Always wipe local cache — sheet is authoritative
    localStorage.removeItem('50pucks_entries_2026');

    if(entries.length>0){
      S.entries=entries;
      saveEntries();
      if(S._nhlStats&&S._nhlStats.length>0){
        const lu=buildLU(S._nhlStats);
        const sc=calcScores(entries,lu);
        const ps=poolStats(sc);
        S.entries=sc;S.stats=ps;S.sel=sc[0]?.teamName||null;
      }else{
        S.stats=null;S.sel=entries[0]?.teamName||null;
      }
      alert(`✓ Loaded ${entries.length} entries from sheet`);
    }else{
      S.entries=[];S.stats=null;S.sel=null;
      alert('ℹ Sheet loaded — no entries yet.');
    }
    render();
    return entries.length>0;
  }catch(err){
    console.error('Sheet fetch error:',err);
    alert(`❌ Failed to fetch sheet: ${err.message}`);
  }
  return false;
}

function parseEntriesCSV(csv){
  // Parse Google Sheet CSV: team_name,owner_name,player_name,player_team,position,pucks[,timestamp]
  const lines=csv.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];

  // Find header row — look for 'team_name' in first 5 lines, otherwise assume row 0 is header
  let headerIdx=0;
  for(let j=0;j<Math.min(lines.length,5);j++){
    if(lines[j].toLowerCase().includes('team_name')){headerIdx=j;break;}
  }

  const entries=new Map();
  for(let i=headerIdx+1;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line)continue; // skip blank lines, don't stop

    const cols=csvL(line); // use proper quoted-CSV parser
    if(cols.length<6)continue;

    const teamName=cols[0].trim();
    const owner=cols[1].trim();
    const playerName=cols[2].trim();
    const playerTeam=cols[3].trim();
    const position=cols[4].trim();
    const pucks=parseInt(cols[5])||1;

    if(!teamName||!playerName)continue;

    if(!entries.has(teamName)){
      entries.set(teamName,{teamName,owner,players:[],total:0,rank:0});
    }
    const entry=entries.get(teamName);
    entry.players.push({name:playerName,team:playerTeam,position,pucks});
    entry.total+=pucks;
  }

  return Array.from(entries.values());
}

function initializePlaceholderPlayoffStats(){

  if(!S._nhlStats||S._nhlStats.length===0)return [];

  return S._nhlStats.map(p=>({

    pts:0,g:0,a:0,
    _s:'Placeholder (Regular Season)',
    playoff_pts:0,playoff_g:0,playoff_a:0,playoff_fetched:false

}

// Merge roster with playoff stats
function mergeRosterWithStats(){
  if(!rostersData)return null;
  // Create map of playoff stats by player name
  const statsMap=new Map();
  if(playoffStats){
    for(const p of playoffStats){
      statsMap.set(p.name.toLowerCase(),p);
    }
  }
  
  // Merge: keep roster info, update with playoff stats where available
  return rostersData.map(r=>{
    const playoff=statsMap.get(r.name.toLowerCase());
    return{
      ...r,
      playoff_pts:playoff?.pts||0,
      playoff_g:playoff?.g||0,
      playoff_a:playoff?.a||0,
      playoff_fetched:!!playoff
    };
  });
}

async function fetchStats(sid){

function calcScores(entries,lu){
  const sc=entries.map(e=>{let tot=0,alv=0,pkR=0,bn=null,wn=null,bs=-1e9,ws=1e9;
    const pl=e.players.map(p=>{const s=mp(p.name,lu);const pts=s?.pts||0,g=s?.g||0,a=s?.a||0,gp=s?.gp||0,m=mt(p.team),ia=al(p.team),sc=pts*m*p.pucks;if(ia){alv++;pkR+=p.pucks;}tot+=sc;if(sc>bs){bs=sc;bn=p.name;}if(sc<ws){ws=sc;wn=p.name;}return{...p,pts,g,a,gp,mult:m,score:Math.round(sc*10)/10,alive:ia,matched:!!s};});
    const fw=pl.filter(p=>p.position==='F').sort((a,b)=>b.score-a.score),df=pl.filter(p=>p.position==='D').sort((a,b)=>b.score-a.score);
    return{...e,players:[...fw,...df],total:Math.round(tot*10)/10,alive:alv,cnt:pl.length,pkR,pkU:pl.reduce((s,p)=>s+p.pucks,0),bp:bn,bs:Math.round(bs*10)/10,wp:wn,ws:Math.round(ws*10)/10};});
  sc.sort((a,b)=>b.total-a.total);let r=1;for(let i=0;i<sc.length;i++){if(i>0&&sc[i].total<sc[i-1].total)r=i+1;sc[i].rank=r;}return sc;
}
function poolStats(en){
  const pop=new Map();let totalPucks=0,deadPucks=0;
  for(const e of en)for(const p of e.players){
    totalPucks+=p.pucks;if(!p.alive)deadPucks+=p.pucks;
    if(!pop.has(p.name))pop.set(p.name,{c:0,tp:0,sc:[],pos:p.position,team:p.team,pts:p.pts,gp:p.gp,alive:p.alive});
    const o=pop.get(p.name);o.c++;o.tp+=p.pucks;o.sc.push(p.score);if(p.pts>o.pts){o.pts=p.pts;o.gp=p.gp;o.alive=p.alive;}
  }
  const pl=[...pop.entries()].map(([n,d])=>({name:n,pos:d.pos,team:d.team,pts:d.pts,alive:d.alive,c:d.c,tp:d.tp,ap:Math.round(d.tp/d.c*10)/10,as:Math.round(d.sc.reduce((a,b)=>a+b,0)/d.c*10)/10,ms:Math.max(...d.sc),own:Math.round(d.c/en.length*100)})).sort((a,b)=>b.c-a.c||b.as-a.as);
  let gB=null,gW=null;for(const e of en)for(const p of e.players){if(!gB||p.score>gB.score)gB={...p,tn:e.teamName};if(!gW||p.score<gW.score)gW={...p,tn:e.teamName};}
  // Pool Concentration: % of total pucks on top 5 most-owned players
  const top5=pl.slice(0,5);const top5pucks=top5.reduce((s,p)=>s+p.tp,0);
  const concentration=totalPucks>0?Math.round(top5pucks/totalPucks*100):0;
  const top5names=top5.map(p=>p.name.split(' ').pop()).join(', ');
  // Dead Puck Rate: % of all pucks on eliminated players
  const deadRate=totalPucks>0?Math.round(deadPucks/totalPucks*100):0;
  return{n:en.length,pool:en.length*sn().fee,pl,gB,gW,avg:en.length?Math.round(en.reduce((s,e)=>s+e.total,0)/en.length):0,concentration,top5names,deadRate,deadPucks,totalPucks};
}

function runSim(en,c){const ns=c.n||1000,res=new Map();en.forEach(e=>res.set(e.teamName,[]));for(let s=0;s<ns;s++)for(const e of en){let t=0;for(const p of e.players)t+=simP(p,c)*p.mult*p.pucks;res.get(e.teamName).push(Math.round(t*10)/10);}const pr=en.map(e=>{const sm=res.get(e.teamName).sort((a,b)=>a-b);return{tn:e.teamName,cur:e.total,mn:Math.round(sm.reduce((a,b)=>a+b,0)/sm.length),md:Math.round(sm[~~(sm.length*.5)]),p10:Math.round(sm[~~(sm.length*.1)]),p90:Math.round(sm[~~(sm.length*.9)])};});const wn=new Map();en.forEach(e=>wn.set(e.teamName,0));for(let s=0;s<ns;s++){let b='',bv=-1e9;for(const[tn,sm]of res)if(sm[s]>bv){bv=sm[s];b=tn;}wn.set(b,(wn.get(b)||0)+1);}pr.forEach(p=>p.wp=Math.round(wn.get(p.tn)/ns*1000)/10);pr.sort((a,b)=>b.mn-a.mn);return pr;}
function simP(p,c){const cur=p.pts||0,gp=p.gp||0;if(!p.alive)return cur;const ppg=gp>0?cur/gp:.5;const adv=c.adv?.[p.mult]??.5;let rem=Math.max(0,Math.min(3,7-(gp%7)));for(let r=0;r<3;r++){if(Math.random()<adv)rem+=4+~~(Math.random()*4);else break;}let f=0;for(let g=0;g<rem;g++){f+=poi(Math.max(0,ppg+gau()*ppg*(c.v||.5)));}return cur+f;}
function gau(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function poi(l){if(l<=0)return 0;const L=Math.exp(-l);let k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}

async function silentRefresh(){

  try{

    const entProm=url?fetch(url).then(r=>r.ok?r.text():null).catch(()=>null):Promise.resolve(null);

      S.entries=sc;S.stats=poolStats(sc);

  Object.values(_charts).forEach(c=>{try{c.destroy();}catch{}});_charts={};

function runEntranceAnimations(){
  // Scroll-triggered entrance for cards
  if(typeof IntersectionObserver!=='undefined'){
    const obs=new IntersectionObserver(entries=>{
      let delay=0;
      entries.forEach(e=>{
        if(e.isIntersecting){
          setTimeout(()=>{e.target.classList.add('visible');},delay);
          delay=Math.min(delay+55,250);
          obs.unobserve(e.target);
        }
      });
    },{threshold:.06,rootMargin:'0px 0px -20px 0px'});
    document.querySelectorAll('.card,.stat-card').forEach(el=>{
      if(!el.classList.contains('visible')){el.classList.add('reveal');obs.observe(el);}
    });
  }
  // Score counter animation on stat card big numbers
  document.querySelectorAll('.cn').forEach(el=>{
    const target=parseFloat(el.dataset.val)||0;
    if(target===0)return;
    const pre=el.dataset.pre||'';
    const suf=el.dataset.suf||'';
    const dur=900;const start=performance.now();
    const isInt=Number.isInteger(target);
    function tick(now){
      const p=Math.min((now-start)/dur,1);
      const ease=1-Math.pow(1-p,3);
      const v=target*ease;
      el.textContent=pre+(isInt?Math.round(v):v.toFixed(1))+suf;
      if(p<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

function tabC(){
  const restricted=['leaderboard','team','chart','players','simulation','stats'];
  if(!isLive()&&restricted.includes(S.tab)){S.tab='info';return NF();}
  switch(S.tab){case'leaderboard':return LB();case'team':return TD();case'chart':return CH();case'players':return PL();case'simulation':return SM();case'stats':return ST();case'info':return NF();case'entry':return EN();case'admin':return AD();default:return'';}
}

  const days=_history.length;

  // Biggest mover — compare last 2 history snapshots
  let moverHtml=`<div style="font-size:11px;color:#94a3b8;line-height:1.5">Not enough history yet.<br>Check back after the next day's refresh.</div>`;
  if(days>=2){
    const cur=_history[days-1].s,prev=_history[days-2].s;
    let best=null,bestGain=-Infinity;
    for(const[name,score] of Object.entries(cur)){const gain=score-(prev[name]||0);if(gain>bestGain){bestGain=gain;best=name;}}
    if(best&&bestGain>=0){
      moverHtml=`<button onclick="set({sel:'${esc(best)}',tab:'team'})" style="background:none;border:none;cursor:pointer;text-align:left;padding:0;font-family:inherit;width:100%">

        <div style="font-size:10px;color:#94a3b8">pts since ${_history[days-2].l} → ${_history[days-1].l}</div>
      </button>`;

  const totalP=e.reduce((t,en)=>t+en.cnt,0),aliveP=e.reduce((t,en)=>t+en.alive,0);

    <div style="font-size:18px;margin-bottom:5px">${medals[i]}</div>

    <div style="font-size:20px;font-weight:800;color:#0f1e35;font-variant-numeric:tabular-nums;letter-spacing:-.02em;margin-top:8px;line-height:1">${fmt(en.total)}</div>
    <div style="font-size:9px;color:#94a3b8;margin-top:2px">${en.pkR} pucks left</div>

  return`<div class="space-y-3">

      <span style="font-size:18px;font-weight:800;color:#0f1e35;letter-spacing:-.02em">Analytics</span>

      <span class="pulse-live" style="margin-left:auto;font-size:9px;font-weight:700;background:rgba(217,119,6,.12);color:#d97706;border:1px solid rgba(217,119,6,.3);border-radius:5px;padding:3px 7px;letter-spacing:.06em">● LIVE</span>
    </div>

    <!-- ① Points evolution — main chart -->
    <div class="card" style="padding:16px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:14px">

          <div style="font-size:13px;font-weight:700;color:#0f1e35">Points Over Time</div>
          <div style="font-size:10px;color:#94a3b8;margin-top:2px">${days<2?'Day 1 — each team shown as a dot; lines grow as days are tracked':'Click any team line to view their detail · hover to compare all scores'}</div>
        </div>
        <div style="font-size:10px;color:#94a3b8;text-align:right;flex-shrink:0">${days>1?`${_history[0].l} → ${_history[days-1].l}`:`Day ${days||1}`}</div>
      </div>

    <!-- ② Podium -->

        ${moverHtml}

      <div class="stat-card">
        <div style="font-size:9px;font-weight:700;color:#0891b2;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Pool Health</div>

function drawDashboard(){
  if(S.tab!=='chart')return;
  const e=S.entries;if(!e.length)return;
  Chart.defaults.color='rgba(0,0,0,.44)';
  const tx={color:'rgba(0,0,0,.44)',font:{family:'Inter',size:10}};
  const gr={color:'rgba(0,0,0,.05)'};
  const anim={animation:{duration:600,easing:'easeInOutQuart'}};
  const pal=['#0891b2','#d97706','#059669','#7c3aed','#db2777','#ea580c','#0284c7','#65a30d','#eab308','#6366f1'];

  // ── Evolution chart ──────────────────────────────────────────
  const evoEl=document.getElementById('evoChart');
  if(evoEl){
    const onClickTeam=(evt,items)=>{if(!items.length)return;const team=e[items[0].datasetIndex];if(team)set({sel:team.teamName,tab:'team'});};
    // Always a line chart — single snapshot shows dots, grows into lines as days pass
    const labels=_history.length?_history.map(h=>h.l):['Today'];
    const singlePoint=_history.length<=1;
    const datasets=e.map((en,i)=>({
      label:en.teamName.length>16?en.teamName.slice(0,16)+'…':en.teamName,
      data:_history.length?_history.map(h=>h.s[en.teamName]??null):[Math.round(en.total)],
      borderColor:pal[i%pal.length],
      backgroundColor:pal[i%pal.length]+'18',
      borderWidth:i<3?2.5:1.5,
      pointRadius:singlePoint?8:_history.length<=21?4:2,
      pointHoverRadius:9,
      pointBackgroundColor:pal[i%pal.length],
      pointStyle:singlePoint?'circle':'circle',
      tension:0.3,
      spanGaps:true,
      fill:false,
    }));
    _charts.evo=new Chart(evoEl,{type:'line',data:{labels,datasets},options:{...anim,responsive:true,maintainAspectRatio:false,onClick:onClickTeam,interaction:{mode:'index',axis:'x',intersect:false},plugins:{legend:{display:e.length<=10,position:'bottom',labels:{...tx,boxWidth:8,padding:10,usePointStyle:true,pointStyleWidth:8}},tooltip:{mode:'index',intersect:false,itemSort:(a,b)=>b.raw-a.raw,callbacks:{footer:()=>'Click to view team'}}},scales:{x:{ticks:tx,grid:gr},y:{ticks:{...tx,callback:v=>Math.round(v)},grid:gr,beginAtZero:false}}}});
    evoEl.style.cursor='pointer';
  }

  // ── Efficiency chart (pts per puck) ──────────────────────────
  const effEl=document.getElementById('effChart');
  if(effEl){
    const eff=e.map(x=>({n:x.teamName.length>16?x.teamName.slice(0,16)+'…':x.teamName,v:x.pkU>0?+(x.total/x.pkU).toFixed(1):0,tn:x.teamName})).sort((a,b)=>b.v-a.v);
    _charts.eff=new Chart(effEl,{type:'bar',data:{labels:eff.map(x=>x.n),datasets:[{data:eff.map(x=>x.v),backgroundColor:eff.map((_,i)=>i===0?'#d97706':i<3?'#d9770666':'#0891b244'),borderColor:eff.map((_,i)=>i===0?'#d97706':i<3?'#d97706aa':'#0891b2aa'),borderWidth:1.5,borderRadius:4}]},options:{...anim,indexAxis:'y',responsive:true,maintainAspectRatio:false,onClick:(evt,items)=>{if(!items.length)return;const t=e.find(x=>x.teamName===eff[items[0].index].tn);if(t)set({sel:t.teamName,tab:'team'});},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+' pts/puck',footer:()=>'Click to view team'}}},scales:{x:{ticks:{...tx,callback:v=>v+' p/pk'},grid:gr},y:{ticks:{...tx,font:{size:10}},grid:{display:false}}}}});
    effEl.style.cursor='pointer';
  }
}

function SM(){
  const c=S.simCfg;
  const inpS='width:100%;background:#f1f5f9;border:1px solid rgba(0,0,0,.1);border-radius:7px;padding:6px 9px;font-size:12px;color:#0f1e35;font-family:inherit;outline:none;margin-top:4px';

function efPkTotal(){return EF.fwd.reduce((s,x)=>s+(parseInt(x.pk)||0),0)+EF.def.reduce((s,x)=>s+(parseInt(x.pk)||0),0);}
function efValid(){
  if(!EF.name.trim()||!EF.owner.trim())return{ok:false,msg:'Enter your team name and your name.'};
  const fwdFilled=EF.fwd.filter(x=>x.p).length;const defFilled=EF.def.filter(x=>x.p).length;
  if(fwdFilled<10)return{ok:false,msg:`Select ${10-fwdFilled} more forward${10-fwdFilled>1?'s':''}.`};
  if(defFilled<5)return{ok:false,msg:`Select ${5-defFilled} more defensem${5-defFilled>1?'en':'an'}.`};
  const t=efPkTotal();if(t!==50)return{ok:false,msg:`Pucks total is ${t}. Must be exactly 50.`};
  // Check duplicates
  const all=[...EF.fwd.map(x=>x.p),...EF.def.map(x=>x.p)].filter(Boolean);
  const dups=all.filter((v,i)=>all.indexOf(v)!==i);
  if(dups.length)return{ok:false,msg:`Duplicate player: ${dups[0]}`};
  return{ok:true,msg:'Ready to submit!'};
}

function efBuildRows(){
  const rows=[];
  [...EF.fwd,...EF.def].forEach((x,i)=>{
    if(!x.p)return;
    const parts=x.p.split(' – ');
    rows.push({team_name:EF.name,owner_name:EF.owner,player_name:parts[0],player_team:parts[1]||'',position:i<10?'F':'D',pucks:x.pk});
  });
  return rows;
}

async function efSubmit(){
  const v=efValid();if(!v.ok)return;
  const rows=efBuildRows();
  if(!APPS_SCRIPT_URL){efMailtoFallback();return;}

  EF._status='sending';saveEF();render();

  try{
    // Hidden iframe form POST — bypasses CORS entirely, no preflight, GAS receives it reliably
    let iframe=document.getElementById('_gas_iframe');
    if(!iframe){
      iframe=document.createElement('iframe');
      iframe.name='_gas_iframe';
      iframe.id='_gas_iframe';
      iframe.style.display='none';
      document.body.appendChild(iframe);
    }
    const form=document.createElement('form');
    form.method='POST';
    form.action=APPS_SCRIPT_URL;
    form.target='_gas_iframe';
    const inp=document.createElement('input');
    inp.type='hidden';inp.name='data';
    inp.value=JSON.stringify({rows});
    form.appendChild(inp);
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    // GAS processes in background — wait 2s then show success
    await new Promise(r=>setTimeout(r,2000));
    EF.submitted=true;EF._status='sent';saveEF();render();
    setTimeout(()=>{EF.submitted=false;render();},3000);
  }catch(err){
    console.error('Submit error:',err);
    EF._status='error';saveEF();render();
  }
}

function efMailtoFallback(){

  lines.push('DEFENSE:');
  EF.def.forEach((x,i)=>{if(x.p)lines.push(`  ${i+1}. ${x.p} — ${x.pk} pucks`);});
  lines.push('');
  lines.push(`Total Pucks: ${efPkTotal()}/50`);
  lines.push('');

  efBuildRows().forEach(r=>lines.push(`${r.team_name},${r.owner_name},${r.player_name},${r.player_team},${r.position},${r.pucks}`));

  window.location.href=`mailto:${POOL_EMAIL}?subject=${subj}&body=${body}`;

function efUpdate(type,idx,field,val){
  if(type==='name')EF.name=val;
  else if(type==='owner')EF.owner=val;
  else if(type==='fwd'){EF.fwd=EF.fwd.map((x,i)=>i===idx?{...x,[field]:val}:x);}
  else if(type==='def'){EF.def=EF.def.map((x,i)=>i===idx?{...x,[field]:val}:x);}
  saveEF();render();
}

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:10px;font-weight:700;color:rgba(0,0,0,.44);text-transform:uppercase;letter-spacing:.07em">Puck Allocation</span>
          <span style="font-size:18px;font-weight:800;color:${puckColor};font-variant-numeric:tabular-nums;line-height:1">${t}<span style="color:rgba(0,0,0,.2);font-size:13px;font-weight:400">/50</span></span>
        </div>
        <div style="height:5px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${puckPct}%;background:${puckColor};border-radius:3px;transition:width .2s,background .2s"></div>
        </div>
      </div>
      <div style="font-size:11px;font-weight:600;white-space:nowrap;color:${v.ok?'#059669':t>50?'#dc2626':'#f59e0b'}">${v.ok?'✓ Ready':'⚠ '+v.msg}</div>
    </div>

    <div class="card">
      ${sectionHdr('Forwards (10)',EF.fwd.filter(x=>x.p).length,10)}
      <div class="overflow-x-auto"><table class="w-full"><thead><tr style="border-bottom:1px solid rgba(0,0,0,.07)">
        <th style="${thS};text-align:center;padding-left:12px;width:32px">#</th>
        <th style="${thS};text-align:left;padding-left:4px">Player</th>
        <th style="${thS};text-align:center;padding-right:12px;width:60px">Pucks</th>
      </tr></thead><tbody>${fwdRows}</tbody></table></div>
    </div>

    <div class="card">
      ${sectionHdr('Defense (5)',EF.def.filter(x=>x.p).length,5)}
      <div class="overflow-x-auto"><table class="w-full"><thead><tr style="border-bottom:1px solid rgba(0,0,0,.07)">
        <th style="${thS};text-align:center;padding-left:12px;width:32px">#</th>
        <th style="${thS};text-align:left;padding-left:4px">Player</th>
        <th style="${thS};text-align:center;padding-right:12px;width:60px">Pucks</th>
      </tr></thead><tbody>${defRows}</tbody></table></div>
    </div>

    ${EF.submitted?`
      <div style="background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.35);border-radius:12px;padding:16px;text-align:center;color:#4ade80;font-weight:700;font-size:14px">
        ✓ Entry Submitted — Good luck!
      </div>
    `:EF._status==='sending'?`
      <div style="background:rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:16px;text-align:center;color:rgba(0,0,0,.55);font-weight:700;font-size:14px">
        Submitting your entry...
      </div>
    `:EF._status==='error'?`
      <button onclick="efMailtoFallback()" style="width:100%;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.35);border-radius:12px;padding:16px;text-align:center;color:#f59e0b;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit">
        ✉ Submit via Email (fallback)
      </button>
      <p style="font-size:10px;color:#f59e0b;text-align:center">Auto-submit failed. Click above to send via email instead.</p>
    `:`
      <button onclick="efSubmit()" ${v.ok?'':'disabled'} style="width:100%;background:${v.ok?'rgba(217,119,6,.15)':'rgba(0,0,0,.05)'};border:1px solid ${v.ok?'rgba(217,119,6,.4)':'rgba(0,0,0,.09)'};border-radius:12px;padding:16px;text-align:center;color:${v.ok?'#f0bc3d':'rgba(0,0,0,.22)'};font-weight:800;font-size:14px;cursor:${v.ok?'pointer':'not-allowed'};font-family:inherit;transition:all .15s;letter-spacing:.01em">
        ${v.ok?'Submit Entry  →':'Complete Your Picks to Submit'}
      </button>
      ${v.ok?`<p style="font-size:10px;color:rgba(0,0,0,.42);text-align:center">Your entry will be sent directly to the pool host.</p>`:''}
    `}

    <div class="card" style="padding:16px">
      <div style="font-size:9px;font-weight:700;color:rgba(0,0,0,.42);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Pool Rules</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="font-size:12px;color:rgba(0,0,0,.55);display:flex;gap:8px"><span style="color:#d97706;font-weight:700;flex-shrink:0">•</span>10 forwards + 5 defense from playoff teams only</div>
        <div style="font-size:12px;color:rgba(0,0,0,.55);display:flex;gap:8px"><span style="color:#d97706;font-weight:700;flex-shrink:0">•</span>Allocate exactly 50 pucks total (min 1, max 6 per player)</div>
        <div style="font-size:12px;color:rgba(0,0,0,.55);display:flex;gap:8px"><span style="color:#d97706;font-weight:700;flex-shrink:0">•</span>Score = Playoff Points × Pucks × Team Multiplier</div>
        <div style="font-size:12px;color:rgba(0,0,0,.55);display:flex;gap:8px"><span style="color:#d97706;font-weight:700;flex-shrink:0">•</span>$${sn().fee} ${CFG.cur} entry fee via e-transfer</div>
      </div>
    </div>
  </div>`;
}

// BOOT
function initApp(){
  loadHistory();
  loadPersistedRoster();
  const entriesLoaded=loadPersistedEntries();
  const statsLoaded=loadPersistedStats();
  if(!entriesLoaded||!statsLoaded){
    loadData();
  }else{
    // Both loaded from localStorage — recalculate scores before rendering
    if(S._nhlStats&&S._nhlStats.length>0&&S.entries&&S.entries.length>0){
      const lu=buildLU(S._nhlStats);
      const sc=calcScores(S.entries,lu);
      const ps=poolStats(sc);
      S.entries=sc;S.stats=ps;S.sel=sc[0]?.teamName||null;
    }
    S.loading=false;
    _lastUpdated=Date.now();
    // Smart default tab: if we have entries, show leaderboard
    if(S.entries.length>0&&S.tab==='entry')S.tab='leaderboard';
    document.getElementById('loader').style.display='none';
    document.getElementById('app').style.display='block';
    render();
  }
  // Header shrink on scroll (set up once)
  let _hdrShrunk=false;
  window.addEventListener('scroll',()=>{
    const y=window.scrollY||document.documentElement.scrollTop;
    const hdr=document.querySelector('header');
    if(!hdr)return;
    const inner=hdr.querySelector('.hdr-inner')||hdr.querySelector('.max-w-5xl');
    if(y>55&&!_hdrShrunk){_hdrShrunk=true;if(inner)inner.style.padding='7px 0';hdr.style.transition='box-shadow .25s';}
    else if(y<=55&&_hdrShrunk){_hdrShrunk=false;if(inner)inner.style.padding='12px 0';}
  },{passive:true});
  // Auto-refresh every 15 minutes; also refresh on tab focus if stale (>5 min)
  if(_refreshTimer)clearInterval(_refreshTimer);
  _refreshTimer=setInterval(silentRefresh,15*60*1000);
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden&&_lastUpdated&&Date.now()-_lastUpdated>5*60*1000)silentRefresh();
  },{once:false});
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initApp);}else{initApp();}
</script>

</body>
</html>
