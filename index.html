// ============================================================
// NHL STATS REST API — proven endpoint for historical + current
// ============================================================
async function fetchStats(seasonId){
  // Primary: stats REST API (works for any season, gameTypeId=3 = playoffs)
  const urls=[
    `https://api.nhle.com/stats/rest/en/skater/summary?isAggregate=false&isGame=false&sort=[{"property":"points","direction":"DESC"},{"property":"goals","direction":"DESC"}]&start=0&limit=200&cayenneExp=gameTypeId=3 and seasonId<=${seasonId} and seasonId>=${seasonId}`,
    `https://api-web.nhle.com/v1/skater-stats-leaders/${seasonId}/3?categories=points,goals,assists&limit=-1`,
  ];
  // Try stats REST API first
  try{
    const r=await fetch(urls[0]);
    if(r.ok){
      const d=await r.json();
      if(d.data&&d.data.length>0){
        console.log(`Loaded ${d.data.length} players from stats REST API`);
        return d.data.map(p=>({id:p.playerId,name:p.skaterFullName,team:nm(p.teamAbbrevs),pos:p.positionCode,gp:p.gamesPlayed||0,g:p.goals||0,a:p.assists||0,pts:p.points||0}));
      }
    }
  }catch(e){console.warn('Stats REST API:',e);}
  // Fallback: leaders API
  try{
    const r=await fetch(urls[1]);
    if(r.ok){const d=await r.json();const res=parseLeaders(d);if(res.length>0){console.log(`Loaded ${res.length} players from leaders API`);return res;}}
  }catch(e){console.warn('Leaders API:',e);}
  console.warn('All API endpoints failed — scores will be 0');
  return[];
}

function parseLeaders(d){
  const m=new Map();
  const proc=(list,cat)=>{if(!list)return;for(const p of list){const id=p.id;if(!m.has(id))m.set(id,{id,name:`${p.firstName?.default||''} ${p.lastName?.default||''}`.trim(),team:nm(p.teamAbbrev?.default||p.teamAbbrev||''),pos:p.positionCode||'',gp:0,g:0,a:0,pts:0});const o=m.get(id);if(cat==='points')o.pts=p.value||0;if(cat==='goals')o.g=p.value||0;if(cat==='assists')o.a=p.value||0;}};
  proc(d.points,'points');proc(d.goals,'goals');proc(d.assists,'assists');
  return[...m.values()];
}

function buildLookup(stats){const m=new Map();for(const p of stats){const k=p.name.toLowerCase().trim();m.set(k,p);const n=k.normalize('NFD').replace(/[\u0300-\u036f]/g,'');if(n!==k)m.set(n,p);}return m;}
function matchP(name,lu){if(!name)return null;const c=name.toLowerCase().trim();if(lu.has(c))return lu.get(c);const n=c.normalize('NFD').replace(/[\u0300-\u036f]/g,'');if(lu.has(n))return lu.get(n);for(const[k,v]of lu){if(k.includes(c)||c.includes(k))return v;}return null;}

}
function parseCsv(csv){const lines=csv.split('\n').filter(l=>l.trim());if(lines.length<2)return[];const ent=new Map();for(let i=1;i<lines.length;i++){const c=csvL(lines[i]);if(c.length<6)continue;const[tn,on,pn,pt,pos,pk]=c.map(x=>x.trim());if(!tn||!pn)continue;if(!ent.has(tn))ent.set(tn,{teamName:tn,owner:on||tn,players:[]});ent.get(tn).players.push({name:pn,team:nm(pt),position:['D','DEF','DEFENSE'].includes((pos||'').toUpperCase())?'D':'F',pucks:parseInt(pk)||0});}return[...ent.values()];}
function csvL(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}

// ============================================================
// SCORING
// ============================================================
function calcScores(entries,lu){
  const sc=entries.map(e=>{let tot=0,alv=0,bn=null,wn=null,bs=-1e9,ws=1e9;
    const pl=e.players.map(p=>{const s=matchP(p.name,lu);const pts=s?.pts||0,g=s?.g||0,a=s?.a||0,gp=s?.gp||0,m=mt(p.team),ia=al(p.team),score=pts*m*p.pucks;if(ia)alv++;tot+=score;if(score>bs){bs=score;bn=p.name;}if(score<ws){ws=score;wn=p.name;}return{...p,pts,g,a,gp,mult:m,score:Math.round(score*10)/10,alive:ia,matched:!!s};});
    const fw=pl.filter(p=>p.position==='F').sort((a,b)=>b.score-a.score);const df=pl.filter(p=>p.position==='D').sort((a,b)=>b.score-a.score);
    return{...e,players:[...fw,...df],total:Math.round(tot*10)/10,alive:alv,count:pl.length,bp:bn,bs:Math.round(bs*10)/10,wp:wn,ws:Math.round(ws*10)/10,pucks:pl.reduce((s,p)=>s+p.pucks,0)};});
  sc.sort((a,b)=>b.total-a.total);let r=1;for(let i=0;i<sc.length;i++){if(i>0&&sc[i].total<sc[i-1].total)r=i+1;sc[i].rank=r;}return sc;
}
function poolStats(en){
  const pop=new Map();for(const e of en)for(const p of e.players){if(!pop.has(p.name))pop.set(p.name,{c:0,tp:0,sc:[],pos:p.position});const o=pop.get(p.name);o.c++;o.tp+=p.pucks;o.sc.push(p.score);}
  const pl=[...pop.entries()].map(([n,d])=>({name:n,pos:d.pos,c:d.c,tp:d.tp,ap:Math.round(d.tp/d.c*10)/10,as:Math.round(d.sc.reduce((a,b)=>a+b,0)/d.c*10)/10,ms:Math.max(...d.sc),own:Math.round(d.c/en.length*100)})).sort((a,b)=>b.c-a.c||b.as-a.as);
  let gB=null,gW=null;for(const e of en)for(const p of e.players){if(!gB||p.score>gB.score)gB={...p,tn:e.teamName};if(!gW||p.score<gW.score)gW={...p,tn:e.teamName};}
  return{n:en.length,pool:en.length*season().entryFee,pl,gB,gW,avg:en.length?Math.round(en.reduce((s,e)=>s+e.total,0)/en.length):0};
}

// ============================================================
// SIMULATION
// ============================================================
function runSim(en,cfg){const ns=cfg.n||1000,res=new Map();en.forEach(e=>res.set(e.teamName,[]));for(let s=0;s<ns;s++)for(const e of en){let t=0;for(const p of e.players)t+=simP(p,cfg)*p.mult*p.pucks;res.get(e.teamName).push(Math.round(t*10)/10);}const pr=en.map(e=>{const sm=res.get(e.teamName).sort((a,b)=>a-b);return{tn:e.teamName,cur:e.total,mn:Math.round(sm.reduce((a,b)=>a+b,0)/sm.length),md:Math.round(sm[~~(sm.length*.5)]),p10:Math.round(sm[~~(sm.length*.1)]),p90:Math.round(sm[~~(sm.length*.9)])};});const wn=new Map();en.forEach(e=>wn.set(e.teamName,0));for(let s=0;s<ns;s++){let b='',bv=-1e9;for(const[tn,sm]of res)if(sm[s]>bv){bv=sm[s];b=tn;}wn.set(b,(wn.get(b)||0)+1);}pr.forEach(p=>p.wp=Math.round(wn.get(p.tn)/ns*1000)/10);pr.sort((a,b)=>b.mn-a.mn);return pr;}
function simP(p,cfg){const cur=p.pts||0,gp=p.gp||0;if(!p.alive)return cur;const ppg=gp>0?cur/gp:.5;const adv=cfg.adv?.[p.mult]??.5;let rem=Math.max(0,Math.min(3,7-(gp%7)));for(let r=0;r<3;r++){if(Math.random()<adv)rem+=4+~~(Math.random()*4);else break;}let f=0;for(let g=0;g<rem;g++){const rate=Math.max(0,ppg+gauss()*ppg*(cfg.v||.5));f+=pois(rate);}return cur+f;}
function gauss(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function pois(l){if(l<=0)return 0;const L=Math.exp(-l);let k=0,p=1;do{k++;p*=Math.random();}while(p>L);return k-1;}

// ============================================================

// ============================================================

function set(u){Object.assign(S,u);render();}

let _ld=false;
async function loadData(){
  if(_ld)return;_ld=true;set({loading:true,simRes:null});
  try{
    const sid=season().id;
    console.log(`Fetching stats for season ${sid}...`);
    const[stats,entries]=await Promise.all([fetchStats(sid).catch(e=>{console.error(e);return[];}),fetchEntries().catch(()=>getSampleEntries())]);
    console.log(`Got ${stats.length} player stats`);
    const lu=buildLookup(stats);const sc=calcScores(entries,lu);const ps=poolStats(sc);
    set({loading:false,entries:sc,stats:ps,sel:sc[0]?.teamName||null});
  }catch(e){console.error(e);set({loading:false});}
  _ld=false;
}

async function switchYear(y){S.year=parseInt(y);await loadData();}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function rb(r){if(r<=3)return`<div class="w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-bold ${r===1?'r1':r===2?'r2':'r3'}">${r}</div>`;return`<span class="text-gray-400 text-sm">${r}</span>`;}
function pk(n){return Array(n).fill('<span class="pk"></span>').join('');}
function tb(t){const c=TM[t]?.c||'#666';return`<span class="inline-block px-1.5 py-0.5 rounded text-[10px] font-semibold" style="background:${c}12;color:${c}">${t}</span>`;}
function ac(a,t){return a>t*.66?'text-emerald-600':a>t*.33?'text-amber-600':'text-red-500';}
function fmt(n){return n.toLocaleString(undefined,{maximumFractionDigits:1});}

function render(){
  const app=document.getElementById('app');
  if(S.loading){app.innerHTML=`<div class="flex items-center justify-center min-h-screen"><div class="text-center"><div class="w-12 h-12 rounded-xl bg-gray-800 flex items-center justify-center text-emerald-400 font-extrabold text-lg mx-auto mb-3">50</div><p class="text-gray-400 text-sm">Loading ${S.year} playoff stats...</p></div></div>`;return;}
  app.innerHTML=hdr()+nav()+`<main class="max-w-6xl mx-auto px-4 py-5">${tabContent()}</main><footer class="border-t border-gray-200 py-5 mt-6"><p class="text-center text-gray-400 text-xs">${CONFIG.title} · ${S.year} NHL Playoffs</p></footer>`;
  Object.values(S.charts).forEach(c=>c.destroy());S.charts={};
  setTimeout(()=>drawCharts(),0);
}

  const yrs=Object.keys(SEASONS).map(y=>`<option value="${y}" ${parseInt(y)===S.year?'selected':''}>${y}</option>`).join('');

function tabContent(){switch(S.tab){case'leaderboard':return leaderboard();case'team':return teamDetail();case'chart':return chartTab();case'players':return playersTab();case'simulation':return simTab();case'info':return infoTab();default:return'';}}

function leaderboard(){
  const e=S.entries,s=S.stats,pool=s?.pool||0;

  return`<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">

    <div class="rounded-lg border border-blue-200 bg-blue-50 p-3"><div class="text-[11px] text-blue-700 font-medium">Best Pick</div><div class="text-xl font-bold text-blue-900 num">${fmt(s?.gB?.score||0)}</div><div class="text-[11px] text-blue-600 truncate">${esc(s?.gB?.name||'—')}</div></div>
    <div class="rounded-lg border border-amber-200 bg-amber-50 p-3"><div class="text-[11px] text-amber-700 font-medium">Avg Score</div><div class="text-xl font-bold text-amber-900 num">${fmt(s?.avg||0)}</div></div>
    <div class="rounded-lg border border-gray-200 bg-gray-50 p-3"><div class="text-[11px] text-gray-500 font-medium">Payouts</div><div class="flex gap-3 mt-1">${pay.map(p=>`<div><div class="text-sm font-bold text-gray-900">$${p.amt}</div><div class="text-[10px] text-gray-400">${p.label}</div></div>`).join('')}</div></div>
  </div>
  <div class="card overflow-hidden"><table class="w-full"><thead><tr class="bg-gray-50 border-b border-gray-200"><th class="text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2 w-10">#</th><th class="text-left text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2">Team</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2">Score</th><th class="text-center text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2 hidden sm:table-cell">Alive</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2 hidden md:table-cell">Best Pick</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase tracking-wider px-4 py-2 hidden lg:table-cell">Worst Pick</th><th class="w-5"></th></tr></thead><tbody>${e.map(en=>`<tr onclick="set({sel:'${esc(en.teamName)}',tab:'team'})" class="border-b border-gray-100 trow cursor-pointer"><td class="px-4 py-2.5">${rb(en.rank)}</td><td class="px-4 py-2.5"><div class="font-semibold text-gray-900 text-sm">${esc(en.teamName)}</div><div class="text-gray-400 text-[11px]">${esc(en.owner)}</div></td><td class="px-4 py-2.5 text-right font-bold text-gray-900 num">${fmt(en.total)}</td><td class="px-4 py-2.5 text-center hidden sm:table-cell"><span class="text-sm font-semibold ${ac(en.alive,en.count)}">${en.alive}/${en.count}</span></td><td class="px-4 py-2.5 text-right hidden md:table-cell"><div class="text-[11px] text-emerald-600 font-medium">${esc(en.bp)}</div><div class="text-[11px] text-gray-400 num">${fmt(en.bs)}</div></td><td class="px-4 py-2.5 text-right hidden lg:table-cell"><div class="text-[11px] text-red-500 font-medium">${esc(en.wp)}</div><div class="text-[11px] text-gray-400 num">${fmt(en.ws)}</div></td><td class="px-1 text-gray-300 text-xs">›</td></tr>`).join('')}</tbody></table></div>`;
}

function teamDetail(){
  const e=S.entries.find(x=>x.teamName===S.sel)||S.entries[0];if(!e)return'';
  const opts=S.entries.map(x=>`<option value="${esc(x.teamName)}" ${x.teamName===e.teamName?'selected':''}>#${x.rank} — ${esc(x.teamName)}</option>`).join('');
  const bar=e.players.map(p=>{const w=(p.pucks/50)*100;const c=TM[p.team]?.c||'#3b82f6';return`<div style="width:${w}%;background:${p.alive?c:'#d1d5db'};opacity:${p.alive?1:.5}" title="${esc(p.name)}: ${p.pucks}pk"></div>`;}).join('');
  const sec=(title,pl)=>{const tot=pl.reduce((s,p)=>s+p.score,0);return`<div class="card overflow-hidden"><div class="flex items-center justify-between px-4 py-2 bg-gray-50 border-b border-gray-200"><span class="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">${title}</span><span class="text-xs text-gray-500 num">${fmt(Math.round(tot))} pts</span></div><div class="overflow-x-auto"><table class="w-full"><thead><tr class="border-b border-gray-100"><th class="text-left text-[10px] text-gray-400 font-medium uppercase px-4 py-1.5">Player</th><th class="text-center text-[10px] text-gray-400 font-medium uppercase px-2 py-1.5">Team</th><th class="text-center text-[10px] text-gray-400 font-medium uppercase px-2 py-1.5">GP</th><th class="text-center text-[10px] text-gray-400 font-medium uppercase px-2 py-1.5">G</th><th class="text-center text-[10px] text-gray-400 font-medium uppercase px-2 py-1.5">A</th><th class="text-center text-[10px] text-gray-400 font-medium uppercase px-2 py-1.5">PTS</th><th class="text-center text-[10px] text-gray-400 font-medium uppercase px-2 py-1.5">Mult</th><th class="text-center text-[10px] text-gray-400 font-medium uppercase px-2 py-1.5">Pucks</th><th class="text-right text-[10px] text-gray-400 font-medium uppercase px-4 py-1.5">Score</th></tr></thead><tbody>${pl.map(p=>`<tr class="border-b border-gray-50 trow"><td class="px-4 py-2"><div class="flex items-center gap-1.5"><span class="dot" style="background:${p.alive?'#10b981':'#d1d5db'}"></span><span class="text-sm ${p.alive?'text-gray-900':'text-gray-400'}">${esc(p.name)}</span>${!p.matched?'<span class="text-[9px] text-amber-500">?</span>':''}</div></td><td class="px-2 py-2 text-center">${tb(p.team)}</td><td class="px-2 py-2 text-center text-sm text-gray-500 num">${p.gp}</td><td class="px-2 py-2 text-center text-sm text-gray-500 num">${p.g}</td><td class="px-2 py-2 text-center text-sm text-gray-500 num">${p.a}</td><td class="px-2 py-2 text-center text-sm text-gray-900 font-semibold num">${p.pts}</td><td class="px-2 py-2 text-center text-xs font-semibold ${p.mult===2?'text-amber-600':p.mult===1.5?'text-blue-600':'text-gray-400'}">${p.mult}x</td><td class="px-2 py-2 text-center">${pk(p.pucks)}</td><td class="px-4 py-2 text-right font-bold text-gray-900 num">${fmt(p.score)}</td></tr>`).join('')}</tbody></table></div></div>`;};
  return`<div class="space-y-4"><select onchange="set({sel:this.value})" class="bg-white border border-gray-300 rounded-lg px-3 py-2 pr-7 text-sm font-medium text-gray-800 focus:outline-none focus:ring-2 focus:ring-emerald-500">${opts}</select><div class="card p-4"><div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-3"><div><div class="text-lg font-bold text-gray-900">${esc(e.teamName)}</div><div class="text-gray-400 text-sm">${esc(e.owner)}</div></div><div class="flex gap-5"><div class="text-center"><div class="text-xl font-bold text-gray-900 num">${fmt(e.total)}</div><div class="text-[10px] text-gray-400">Score</div></div><div class="text-center"><div class="text-xl font-bold ${ac(e.alive,e.count)} num">${e.alive}/${e.count}</div><div class="text-[10px] text-gray-400">Alive</div></div><div class="text-center"><div class="text-xl font-bold text-gray-500 num">${e.pucks}/50</div><div class="text-[10px] text-gray-400">Pucks</div></div></div></div><div class="flex gap-0.5 rounded overflow-hidden h-2">${bar}</div></div>${sec('Forwards',e.players.filter(p=>p.position==='F'))}${sec('Defense',e.players.filter(p=>p.position==='D'))}</div>`;
}

function chartTab(){
  const colors=['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899'];
  const e=S.entries,mx=e[0]?.total||1;
  const bars=e.map((en,i)=>`<div class="flex items-center gap-2 mb-1.5"><div class="w-28 sm:w-40 text-[11px] text-gray-500 truncate text-right flex-shrink-0">${esc(en.teamName)}</div><div class="flex-1 bar-bg"><div class="bar-f" style="width:${Math.max(en.total/mx*100,3)}%;background:${colors[i%colors.length]}"><span class="text-[10px] font-bold text-white">${fmt(en.total)}</span></div></div><span class="w-7 text-[11px] text-right flex-shrink-0 ${ac(en.alive,en.count)}">${en.alive}</span></div>`).join('');
  return`<div class="space-y-4"><div class="card p-4"><h3 class="text-sm font-semibold text-gray-700 mb-3">Score Comparison</h3>${bars}<div class="text-right text-[10px] text-gray-400 mt-1">alive →</div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-4"><div class="card p-4"><h3 class="text-sm font-semibold text-gray-700 mb-2">By Position</h3><canvas id="posChart" height="240"></canvas></div><div class="card p-4"><h3 class="text-sm font-semibold text-gray-700 mb-2">By Multiplier</h3><canvas id="multChart" height="240"></canvas></div></div></div>`;
}

function playersTab(){
  if(!S.stats)return'';let pl=S.stats.pl.slice();
  if(S.pPos!=='all')pl=pl.filter(p=>p.pos===S.pPos);
  if(S.pSort==='avgScore')pl.sort((a,b)=>b.as-a.as);else if(S.pSort==='avgPucks')pl.sort((a,b)=>b.ap-a.ap);
  const btn=(v,k,l)=>`<button onclick="set({${k}:'${v}'})" class="px-2.5 py-1 rounded text-xs font-medium ${S[k]===v?'bg-gray-900 text-white':'text-gray-500 hover:text-gray-800'}">${l}</button>`;
  return`<div class="space-y-4"><div class="card p-4"><h3 class="text-sm font-semibold text-gray-700 mb-2">Ownership (Top 10)</h3><canvas id="ownChart" height="260"></canvas></div><div class="flex flex-wrap gap-2"><div class="flex gap-0.5 bg-gray-100 rounded p-0.5">${btn('all','pPos','All')}${btn('F','pPos','Fwd')}${btn('D','pPos','Def')}</div><div class="flex gap-0.5 bg-gray-100 rounded p-0.5">${btn('ownership','pSort','Ownership')}${btn('avgScore','pSort','Avg Score')}${btn('avgPucks','pSort','Avg Pucks')}</div></div><div class="card overflow-hidden"><table class="w-full"><thead><tr class="bg-gray-50 border-b border-gray-200"><th class="text-left text-[10px] font-semibold text-gray-500 uppercase px-4 py-2">Player</th><th class="text-center text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">Pos</th><th class="text-center text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">Owned</th><th class="text-center text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">Own%</th><th class="text-center text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">Avg Pk</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">Avg Score</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-4 py-2">Max</th></tr></thead><tbody>${pl.map(p=>`<tr class="border-b border-gray-50 trow"><td class="px-4 py-2 text-sm font-medium text-gray-900">${esc(p.name)}</td><td class="px-2 py-2 text-center text-xs font-semibold ${p.pos==='D'?'text-amber-600':'text-blue-600'}">${p.pos}</td><td class="px-2 py-2 text-center text-sm text-gray-500 num">${p.c}/${S.entries.length}</td><td class="px-2 py-2 text-center"><div class="flex items-center gap-1.5 justify-center"><div class="w-12 h-1.5 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${p.own}%;background:${p.own===100?'#f59e0b':'#10b981'}"></div></div><span class="text-[11px] text-gray-400">${p.own}%</span></div></td><td class="px-2 py-2 text-center text-sm text-orange-600 num">${p.ap}</td><td class="px-2 py-2 text-right text-sm text-gray-600 num">${fmt(p.as)}</td><td class="px-4 py-2 text-right text-sm font-bold text-gray-900 num">${fmt(p.ms)}</td></tr>`).join('')}</tbody></table></div></div>`;
}

function simTab(){
  const c=S.simCfg;const si=(l,v,k)=>`<div><label class="text-[11px] text-gray-500">${l}</label><input type="number" value="${v}" onchange="updSim('${k}',this.value)" class="w-full mt-0.5 bg-white border border-gray-300 rounded px-2.5 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500"></div>`;
  const settings=S.showSim?`<div class="card p-4"><div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">${si('Simulations',c.n,'n')}${si('Variance',c.v,'v')}${si('Fav Adv (1.0x)',c.adv[1],'a1')}${si('Mid Adv (1.5x)',c.adv[1.5],'a15')}${si('WC Adv (2.0x)',c.adv[2],'a2')}</div></div>`:'';
  let res='';
  if(!S.simRes&&!S.simRun)res=`<div class="card p-10 text-center"><p class="text-gray-400 text-sm">Click Run to project final standings</p></div>`;
  else if(S.simRes){
    const pr=S.simRes;const wb=pr.slice().sort((a,b)=>b.wp-a.wp);
    res=`<div class="card p-4"><h3 class="text-sm font-semibold text-gray-700 mb-3">Win Probability</h3>${wb.map((p,i)=>`<div class="flex items-center gap-2 mb-1"><div class="w-28 sm:w-40 text-[11px] text-gray-500 truncate text-right flex-shrink-0">${esc(p.tn)}</div><div class="flex-1 bar-bg h-5"><div class="bar-f h-5" style="width:${Math.max(p.wp,1)}%;background:${i===0?'#f59e0b':i===1?'#9ca3af':'#10b981'}">${p.wp>=8?`<span class="text-[10px] font-bold text-white">${p.wp}%</span>`:''}</div></div>${p.wp<8?`<span class="text-[11px] text-gray-400 w-9 text-right">${p.wp}%</span>`:''}</div>`).join('')}</div>
    <div class="card overflow-hidden"><table class="w-full"><thead><tr class="bg-gray-50 border-b border-gray-200"><th class="text-left text-[10px] font-semibold text-gray-500 uppercase px-4 py-2">Team</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">Current</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">Mean</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">Median</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">10th</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-2 py-2">90th</th><th class="text-right text-[10px] font-semibold text-gray-500 uppercase px-4 py-2">Win%</th></tr></thead><tbody>${pr.map(p=>`<tr class="border-b border-gray-50 trow"><td class="px-4 py-2 text-sm font-medium text-gray-900">${esc(p.tn)}</td><td class="px-2 py-2 text-right text-sm text-gray-400 num">${fmt(p.cur)}</td><td class="px-2 py-2 text-right text-sm font-bold text-gray-900 num">${fmt(p.mn)}</td><td class="px-2 py-2 text-right text-sm text-gray-500 num">${fmt(p.md)}</td><td class="px-2 py-2 text-right text-sm text-red-400 num">${fmt(p.p10)}</td><td class="px-2 py-2 text-right text-sm text-emerald-600 num">${fmt(p.p90)}</td><td class="px-4 py-2 text-right text-sm font-bold ${p.wp>=30?'text-amber-600':p.wp>=10?'text-blue-600':'text-gray-400'} num">${p.wp}%</td></tr>`).join('')}</tbody></table></div>`;
  }
  return`<div class="space-y-4"><div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3"><div><div class="font-semibold text-gray-900">Monte Carlo Projections</div><div class="text-xs text-gray-400">Player pts/game rates × team advancement probability</div></div><div class="flex gap-2"><button onclick="set({showSim:!S.showSim})" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded text-xs font-medium text-gray-600">⚙ Settings</button><button onclick="doSim()" ${S.simRun?'disabled':''} class="px-4 py-1.5 bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white rounded text-xs font-semibold">${S.simRun?'Running...':'▶ Run ('+c.n.toLocaleString()+')'}</button></div></div>${settings}${res}</div>`;
}

function infoTab(){
  const pool=S.stats?.pool||0;const pay=CONFIG.payoutSplit.map(p=>({...p,amt:Math.round(pool*p.pct)}));
  const ms=season().multipliers;const tByM={};Object.entries(ms).forEach(([t,m])=>{const k=m+'x';if(!tByM[k])tByM[k]=[];tByM[k].push(t);});
  const mH=Object.keys(ms).length?['2x','1.5x','1x'].filter(k=>tByM[k]?.length).map(tier=>{const m=parseFloat(tier);const lbl=m===2?'Wild Card':m===1?'Div Winners':'Middle';const cl=m===2?'text-amber-600':m===1?'text-gray-500':'text-blue-600';return`<div class="mb-2"><span class="text-sm font-bold ${cl}">${tier}</span> <span class="text-xs text-gray-400">${lbl}</span><div class="flex flex-wrap gap-1 mt-1">${(tByM[tier]||[]).sort().map(t=>`<span class="px-2 py-0.5 rounded text-xs font-medium ${season().alive.includes(t)?'bg-gray-100 text-gray-800':'bg-gray-50 text-gray-300 line-through'}">${t}</span>`).join('')}</div></div>`;}).join(''):'<p class="text-gray-400 text-sm">Not yet assigned.</p>';
  const rl=(n,t)=>`<div class="flex gap-2.5 mb-2.5"><span class="w-5 h-5 rounded-full bg-emerald-100 flex items-center justify-center text-[10px] font-bold text-emerald-700 flex-shrink-0">${n}</span><p class="text-sm text-gray-700">${t}</p></div>`;
  return`<div class="space-y-4">
    <div class="card p-4"><h3 class="text-sm font-semibold text-gray-900 mb-2">Rules</h3>${rl(1,`Pick ${CONFIG.forwards}F + ${CONFIG.defense}D.`)}${rl(2,`Allocate ${CONFIG.totalPucks} pucks (min ${CONFIG.minPucks}, max ${CONFIG.maxPucks}).`)}${rl(3,'WC = 2.0x, middle = 1.5x, div winners = 1.0x.')}${rl(4,'<strong>Score = Points × Pucks × Multiplier</strong>')}${rl(5,`$${season().entryFee} ${CONFIG.currency} per entry.`)}</div>
    <div class="card p-4"><h3 class="text-sm font-semibold text-gray-900 mb-2">Scoring Example</h3><div class="bg-gray-50 rounded p-3 text-sm text-gray-600">McDavid · 6 pucks · EDM 1.5x · 10 pts → <span class="text-blue-600">10</span> × <span class="text-amber-600">1.5</span> × <span class="text-orange-600">6</span> = <strong class="text-gray-900">90</strong></div></div>
    <div class="card p-4"><h3 class="text-sm font-semibold text-gray-900 mb-2">Team Multipliers (${S.year})</h3>${mH}</div>
    <div class="card p-4"><h3 class="text-sm font-semibold text-gray-900 mb-2">Payouts</h3><div class="flex gap-4">${pay.map(p=>`<div class="text-center"><div class="w-8 h-8 mx-auto rounded-full flex items-center justify-center text-xs font-bold mb-1 ${p.place===1?'r1':p.place===2?'r2':'r3'}">${p.label}</div><div class="font-bold text-gray-900">$${p.amt}</div><div class="text-[10px] text-gray-400">${Math.round(p.pct*100)}%</div></div>`).join('')}</div></div>
    <div class="card p-4"><h3 class="text-sm font-semibold text-gray-900 mb-2">Entries</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-2">${S.entries.map(e=>`<div class="flex items-center justify-between p-2.5 bg-gray-50 rounded"><div><div class="text-sm font-medium text-gray-900">${esc(e.teamName)}</div><div class="text-[11px] text-gray-400">${esc(e.owner)}</div></div><div class="text-right"><div class="text-sm font-bold text-gray-900 num">${fmt(e.total)}</div><div class="text-[10px] text-gray-400">#${e.rank}</div></div></div>`).join('')}</div></div>
  </div>`;
}

function drawCharts(){
  const gx={color:'#aaa',font:{family:'Inter',size:10}};const gr={color:'rgba(0,0,0,.04)'};
  if(S.tab==='chart'){
    const el=document.getElementById('posChart');if(el){const lb=S.entries.map(e=>e.teamName.length>13?e.teamName.slice(0,13)+'…':e.teamName);S.charts.p=new Chart(el,{type:'bar',data:{labels:lb,datasets:[{label:'Forwards',data:S.entries.map(e=>Math.round(e.players.filter(p=>p.position==='F').reduce((s,p)=>s+p.score,0))),backgroundColor:'#3b82f6',borderRadius:3},{label:'Defense',data:S.entries.map(e=>Math.round(e.players.filter(p=>p.position==='D').reduce((s,p)=>s+p.score,0))),backgroundColor:'#f59e0b',borderRadius:3}]},options:{responsive:true,plugins:{legend:{labels:gx}},scales:{x:{ticks:gx,grid:gr},y:{ticks:gx,grid:gr}}}});}
    const el2=document.getElementById('multChart');if(el2){const lb=S.entries.map(e=>e.teamName.length>13?e.teamName.slice(0,13)+'…':e.teamName);S.charts.m=new Chart(el2,{type:'bar',data:{labels:lb,datasets:[{label:'1.0x',data:S.entries.map(e=>Math.round(e.players.filter(p=>p.mult===1).reduce((s,p)=>s+p.score,0))),backgroundColor:'#d1d5db',borderRadius:3},{label:'1.5x',data:S.entries.map(e=>Math.round(e.players.filter(p=>p.mult===1.5).reduce((s,p)=>s+p.score,0))),backgroundColor:'#3b82f6',borderRadius:3},{label:'2.0x',data:S.entries.map(e=>Math.round(e.players.filter(p=>p.mult===2).reduce((s,p)=>s+p.score,0))),backgroundColor:'#f59e0b',borderRadius:3}]},options:{responsive:true,plugins:{legend:{labels:gx}},scales:{x:{stacked:true,ticks:gx,grid:gr},y:{stacked:true,ticks:gx,grid:gr}}}});}
  }
  if(S.tab==='players'){
    const el=document.getElementById('ownChart');if(el&&S.stats){const top=S.stats.pl.slice(0,10);S.charts.o=new Chart(el,{type:'bar',data:{labels:top.map(p=>p.name.split(' ').pop()),datasets:[{data:top.map(p=>p.own),backgroundColor:top.map(p=>p.own===100?'#f59e0b':'#10b981'),borderRadius:3}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}%`}}},scales:{x:{ticks:{...gx,callback:v=>v+'%'},grid:gr},y:{ticks:{...gx,color:'#374151',font:{size:11,weight:'500'}},grid:{display:false}}}}});}
  }
}

// ============================================================
// ACTIONS
// ============================================================
function updSim(k,v){const f=parseFloat(v);if(k==='n')S.simCfg.n=Math.max(100,parseInt(v)||1000);else if(k==='v')S.simCfg.v=f;else if(k==='a1')S.simCfg.adv[1]=f;else if(k==='a15')S.simCfg.adv[1.5]=f;else if(k==='a2')S.simCfg.adv[2]=f;render();}
function doSim(){set({simRun:true});setTimeout(()=>{set({simRes:runSim(S.entries,S.simCfg),simRun:false});},50);}

// ============================================================
// BOOT
// ============================================================
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',loadData);}else{loadData();}
</script>
</body>
</html>
